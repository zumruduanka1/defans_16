<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEFANS PRO | Dezenformasyon Analiz Sistemi</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- EKLENEN -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <style>
        :root {
            --bg-dark: #080a0f;
            --card-bg: rgba(22, 27, 34, 0.6);
            --border-color: #21262d;
            --accent-purple: #7d5fff;
            --accent-blue: #3d5afe;
            --text-gray: #8b949e;
            --danger: #ff4757;
            --warning: #f39c12;
            --success: #2ed573;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at top, #161b22 0%, #080a0f 100%);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        header {
            max-width: 1200px;
            margin: 0 auto 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { display: flex; align-items: center; gap: 10px; font-size: 22px; font-weight: 700; }

        .logo-box {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            width: 32px; height: 32px;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
        }

        .ai-badge {
            font-size: 12px;
            border: 1px solid #1f2937;
            padding: 6px 16px;
            border-radius: 20px;
            color: #58a6ff;
            background: rgba(56, 139, 253, 0.1);
        }

        .hero { text-align: center; margin-bottom: 50px; }

        .hero h1 { font-size: 64px; font-weight: 800; }

        .hero p { color: var(--text-gray); max-width: 600px; margin: 20px auto; }

        .stats-row { display: flex; justify-content: center; gap: 15px; margin-bottom: 60px; }

        .stat-box {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 16px;
            min-width: 160px;
            text-align: center;
        }

        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 30px;
        }

        textarea {
            width: 100%;
            background: #ebf1f9;
            border-radius: 12px;
            padding: 14px;
        }

        .btn-main {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            background: linear-gradient(90deg, #4461f2, #7d5fff);
            color: white;
            cursor: pointer;
            margin-top: 15px;
        }

        table { width: 100%; border-collapse: collapse; }
        td { padding: 15px 0; border-top: 1px solid var(--border-color); }

        .progress-container {
            width: 80px;
            height: 6px;
            background: #21262d;
            border-radius: 10px;
        }

        .progress-bar { height: 100%; border-radius: 10px; }

        /* EKLENEN */
        #resultBox {
            margin-top:15px;
            padding:15px;
            background:#161b22;
            border-radius:12px;
        }
    </style>
</head>

<body>

<header>
    <div class="logo">
        <div class="logo-box"><i class="fa-solid fa-shield-halved"></i></div>
        DEFANS PRO
    </div>
    <div class="ai-badge">AI Powered</div>
</header>

<section class="hero">
    <h1>DEFANS</h1>
    <h1>Dezenformasyon Analiz Sistemi</h1>
</section>

<div class="grid-container">

<div class="card">
    <h3>Yeni Analiz</h3>

    <textarea id="textInput"></textarea>

    <button class="btn-main">Analiz Başlat</button>

    <div id="resultBox">Sonuç burada</div>
</div>

<div class="card">
    <h3>Son Analizler</h3>

    <table>
        <tbody id="logTable"></tbody>
    </table>
</div>

</div>

<script>
const socket = io();

document.querySelector(".btn-main").onclick = async () => {

    const text = document.getElementById("textInput").value;

    const res = await fetch("/analyze",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({text})
    });

    const data = await res.json();

    document.getElementById("resultBox").innerHTML =
        `<b>Risk:</b> ${data.risk}%<br>${data.why || ""}`;
};

socket.on("live",(d)=>{

    const tr = document.createElement("tr");

    tr.innerHTML = `
    <td>${d.text.slice(0,30)}</td>
    <td>
        <div class="progress-container">
            <div class="progress-bar" style="width:${d.risk}%; background:#7d5fff"></div>
        </div>
    </td>
    <td>${d.risk}%</td>
    `;

    document.getElementById("logTable").prepend(tr);
});

socket.on("alert",(d)=>{
    alert("⚠ Riskli içerik: " + d.text.slice(0,50));
});
</script>

</body>
</html>
