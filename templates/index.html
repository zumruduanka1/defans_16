<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>DEFANS PRO | Sosyal Medya Analiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <style>
        :root { --bg: #080a0f; --card: #161b22; --border: #21262d; --blue: #3d5afe; --danger: #ff4757; --success: #2ed573; --gray: #8b949e; }
        body { background: radial-gradient(circle at top, #161b22, #080a0f); color: white; font-family: 'Inter', sans-serif; padding: 20px; margin: 0; }
        .container { max-width: 1200px; margin: auto; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid var(--border); }
        .hero { text-align: center; margin: 50px 0; }
        .hero h1 { font-size: 80px; font-weight: 900; letter-spacing: -4px; margin: 0; }
        .stats { display: flex; justify-content: center; gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); padding: 25px; border-radius: 20px; min-width: 200px; text-align: center; }
        .grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 30px; }
        .card { background: rgba(22, 27, 34, 0.7); border: 1px solid var(--border); padding: 30px; border-radius: 25px; backdrop-filter: blur(10px); }
        textarea { width: 100%; background: #ebf1f9; border: none; padding: 20px; border-radius: 15px; color: #111; font-size: 16px; height: 160px; font-family: inherit; }
        button { width: 100%; padding: 20px; border: none; border-radius: 15px; background: linear-gradient(90deg, var(--blue), #7d5fff); color: white; font-weight: 900; cursor: pointer; margin-top: 15px; font-size: 16px; }
        .result-box { margin-top: 25px; padding: 25px; background: #0d1117; border-radius: 20px; border: 1px solid var(--border); display: none; text-align: center; }
        .progress { height: 12px; background: #222; border-radius: 6px; margin: 20px 0; overflow: hidden; }
        .bar { height: 100%; width: 0%; transition: 1.5s; background: var(--blue); }
        .feed-item { padding: 15px; border-bottom: 1px solid var(--border); cursor: pointer; transition: 0.2s; display: flex; gap: 15px; align-items: center; }
        .feed-item:hover { background: rgba(255,255,255,0.05); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div style="font-weight: 800; font-size: 24px;"><i class="fa-solid fa-shield-halved" style="color:var(--blue)"></i> DEFANS PRO AI</div>
            <div style="color:var(--success); font-weight: bold; font-size: 12px;"><i class="fa-solid fa-circle-check"></i> CANLI TAKİP AKTİF</div>
        </header>

        <section class="hero">
            <h1>DEFANS</h1>
            <p style="color:var(--gray)">Sosyal Medya Dezenformasyon ve Yalan Haber Tespit Sistemi</p>
        </section>

        <div class="stats">
            <div class="stat-card"> <h2 id="total-val">0</h2> <span>TOPLAM TARAMA</span> </div>
            <div class="stat-card"> <h2 id="risk-val" style="color:var(--danger)">0</h2> <span>RİSKLİ</span> </div>
            <div class="stat-card"> <h2 id="safe-val" style="color:var(--success)">0</h2> <span>GÜVENLİ</span> </div>
        </div>

        <div class="grid">
            <div class="card">
                <h3><i class="fa-solid fa-microchip"></i> ANALİZ PANELİ</h3>
                <textarea id="uInput" placeholder="Analiz edilecek sosyal medya içeriğini buraya yapıştırın..."></textarea>
                <button onclick="run()">ŞİMDİ ANALİZ ET VE MAİL AT</button>
                <div class="result-box" id="resBox">
                    <div id="resTitle" style="color: var(--gray);">Yapay Zeka İnceliyor...</div>
                    <div class="progress"><div class="bar" id="resBar"></div></div>
                    <div id="resStatus" style="font-size: 24px; font-weight: 900;"></div>
                </div>
            </div>
            <div class="card">
                <h3><i class="fa-solid fa-rss"></i> SOSYAL MEDYA AKIŞI</h3>
                <div id="feedArea">Taranıyor...</div>
            </div>
        </div>
    </div>

    <script>
        async function run() {
            const val = document.getElementById("uInput").value;
            if(val.length < 5) return alert("Lütfen içerik girin!");
            document.getElementById("resBox").style.display = "block";

            const res = await fetch("/analyze", {
                method: "POST", headers: {"Content-Type": "application/json"},
                body: JSON.stringify({text: val})
            });
            const data = await res.json();

            document.getElementById("total-val").innerText = data.current_stats.total;
            document.getElementById("risk-val").innerText = data.current_stats.risk;
            document.getElementById("safe-val").innerText = data.current_stats.safe;

            document.getElementById("resBar").style.width = data.risk + "%";
            document.getElementById("resStatus").innerText = data.status;
            document.getElementById("resTitle").innerText = "Tespit Skoru: %" + data.risk;
            
            let color = data.risk > 70 ? "var(--danger)" : (data.risk > 45 ? "#f39c12" : "var(--success)");
            document.getElementById("resBar").style.background = color;
            document.getElementById("resStatus").style.color = color;
        }

        async function loadFeed() {
            const res = await fetch("/feed");
            const data = await res.json();
            let html = "";
            data.forEach(i => {
                let icon = i.platform == "Twitter" ? "fa-x-twitter" : ("fa-"+i.platform.toLowerCase());
                html += `<div class="feed-item" onclick="document.getElementById('uInput').value='${i.text}';">
                    <i class="fa-brands ${icon}" style="font-size: 20px; color:var(--blue)"></i>
                    <div>
                        <div style="font-size: 14px;">${i.text}</div>
                        <div style="font-size: 11px; margin-top: 4px; color: var(--gray)">
                            ${i.platform} • <span style="color: ${i.risk > 50 ? 'var(--danger)':'var(--success)'}">Risk: %${i.risk}</span>
                        </div>
                    </div>
                </div>`;
            });
            document.getElementById("feedArea").innerHTML = html;
        }
        loadFeed();
    </script>
</body>
</html>
