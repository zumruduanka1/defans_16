<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEFANS PRO | Sosyal Medya Analizi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <style>
        :root { --bg: #080a0f; --card: #161b22; --border: #21262d; --blue: #3d5afe; --purple: #7d5fff; --danger: #ff4757; --success: #2ed573; --gray: #8b949e; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; padding: 20px; margin: 0; }
        .container { max-width: 1200px; margin: auto; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid var(--border); margin-bottom: 40px; }
        .logo { font-size: 24px; font-weight: 800; display: flex; align-items: center; gap: 10px; }
        .grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 25px; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 30px; border-radius: 24px; }
        textarea { width: 100%; background: #ebf1f9; border: none; padding: 15px; border-radius: 15px; margin-bottom: 20px; color: #111; height: 150px; font-family: inherit; }
        button { width: 100%; padding: 18px; border: none; border-radius: 15px; background: linear-gradient(90deg, var(--blue), var(--purple)); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 16px; }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(61,90,254,0.4); }
        .result-box { margin-top: 25px; padding: 20px; background: #0d1117; border-radius: 15px; border: 1px solid var(--border); display: none; text-align: center; }
        .progress { height: 10px; background: #222; border-radius: 5px; margin: 15px 0; overflow: hidden; }
        .bar { height: 100%; width: 0%; transition: 1s; background: var(--blue); }
        .feed-item { padding: 15px; border-bottom: 1px solid var(--border); cursor: pointer; display: flex; gap: 15px; transition: 0.2s; }
        .feed-item:hover { background: rgba(255,255,255,0.05); }
        .risk-badge { font-size: 10px; padding: 3px 8px; border-radius: 5px; font-weight: bold; }
        @media (max-width: 992px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo"><i class="fa-solid fa-shield-halved"></i> DEFANS PRO</div>
            <div style="color: var(--success); font-weight: bold;"><i class="fa-solid fa-circle-dot"></i> CANLI TAKİP</div>
        </header>

        <div class="grid">
            <div class="card">
                <h3 style="color: var(--gray); margin-bottom: 20px;"><i class="fa-solid fa-bolt"></i> ANLIK ANALİZ VE RAPORLAMA</h3>
                <textarea id="textInput" placeholder="Sosyal medyadan bir metin veya link yapıştırın. Analiz sonuçları anında mail ile iletilecektir..."></textarea>
                <button onclick="runAnalysis()">ANALİZ ET VE BİLDİR</button>

                <div class="result-box" id="resBox">
                    <div id="resTitle" style="font-size: 14px; color: var(--gray);">Risk Durumu Bekleniyor...</div>
                    <div class="progress"><div id="resBar" class="bar"></div></div>
                    <div id="resStatus" style="font-size: 22px; font-weight: 800;"></div>
                </div>
            </div>

            <div class="card">
                <h3 style="color: var(--gray); margin-bottom: 20px;"><i class="fa-solid fa-rss"></i> SOSYAL MEDYA KAYNAKLARI</h3>
                <div id="feedList" style="max-height: 500px; overflow-y: auto;">
                    <p style="text-align: center; color: var(--gray);">Ağlar taranıyor...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function runAnalysis() {
            const text = document.getElementById("textInput").value;
            if(text.length < 5) return alert("İçerik çok kısa!");
            
            document.getElementById("resBox").style.display = "block";
            document.getElementById("resStatus").innerText = "İnceleniyor...";
            
            const response = await fetch("/analyze", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({text})
            });
            const data = await response.json();
            
            document.getElementById("resBar").style.width = data.risk + "%";
            document.getElementById("resStatus").innerText = data.status;
            document.getElementById("resTitle").innerText = "Raporlanan Risk Skoru: %" + data.risk;
            
            let color = "var(--success)";
            if(data.risk > 70) color = "var(--danger)";
            else if(data.risk > 45) color = "var(--warning)";
            document.getElementById("resBar").style.background = color;
            document.getElementById("resStatus").style.color = color;
        }

        async function updateFeed() {
            try {
                const res = await fetch("/feed");
                const data = await res.json();
                let html = "";
                data.forEach(item => {
                    const color = item.risk > 60 ? 'var(--danger)' : 'var(--success)';
                    html += `
                        <div class="feed-item" onclick="document.getElementById('textInput').value='${item.text.replace(/'/g,"")}';">
                            <i class="fa-solid fa-hashtag" style="color: var(--blue)"></i>
                            <div>
                                <div style="font-size: 13px;">${item.text}</div>
                                <div style="font-size: 10px; margin-top: 5px;">
                                    <span style="color: var(--gray)">${item.platform}</span> | 
                                    <span style="color: ${color}">Risk: %${item.risk}</span>
                                </div>
                            </div>
                        </div>`;
                });
                document.getElementById("feedList").innerHTML = html;
            } catch (e) { document.getElementById("feedList").innerText = "Veri akışında hata."; }
        }
        updateFeed();
        setInterval(updateFeed, 60000);
    </script>
</body>
</html>
