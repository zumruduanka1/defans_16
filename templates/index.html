<!DOCTYPE html>
<html>
<head>
<title>DEFANS PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
body {background:#0b0f19;color:white;font-family:Arial;}
.container{width:1100px;margin:auto;}
.card{background:#151a2b;padding:20px;border-radius:15px;margin-top:20px;}
button{padding:15px;width:100%;background:#3d5afe;border:none;color:white;}
.feed-item{padding:10px;border-bottom:1px solid #333;cursor:pointer;}
</style>
</head>

<body>

<div class="container">

<h1>DEFANS</h1>

<div class="card">
<textarea id="text"></textarea>
<button onclick="analyze()">Analiz</button>
</div>

<div class="card">
<h3>Risk</h3>
<canvas id="chart"></canvas>
</div>

<div class="card">
<h3>Haber Akışı</h3>
<div id="news"></div>
</div>

<div class="card">
<h3>Twitter</h3>
<div id="twitter"></div>
</div>

</div>

<script>

let chart = new Chart(document.getElementById("chart"), {
    type: 'doughnut',
    data: {
        labels: ['Risk','Güvenli'],
        datasets: [{
            data: [50,50]
        }]
    }
});

async function analyze(){
    const text = document.getElementById("text").value;

    const res = await fetch("/analyze",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({text})
    });

    const data = await res.json();

    chart.data.datasets[0].data = [data.risk, 100-data.risk];
    chart.update();
}

async function loadNews(){
    const res = await fetch("/news");
    const data = await res.json();

    let html="";
    data.forEach(n=>{
        html += `<div class="feed-item" onclick="use('${n.text}')">📰 ${n.text}</div>`;
    });

    document.getElementById("news").innerHTML = html;
}

async function loadTwitter(){
    const res = await fetch("/twitter");
    const data = await res.json();

    let html="";
    data.forEach(t=>{
        html += `<div class="feed-item" onclick="use('${t.text}')">🐦 ${t.text}</div>`;
    });

    document.getElementById("twitter").innerHTML = html;
}

function use(t){
    document.getElementById("text").value = t;
}

loadNews();
loadTwitter();

</script>

</body>
</html>
