<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>DEFANS PRO | X-VERIFY</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <style>
        :root { --bg: #000; --card: #15181c; --blue: #1d9bf0; --border: #2f3336; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; }
        
        /* TWITTER BANNER ALANI */
        .banner { 
            width: 100%; height: 200px; 
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), url('https://abs.twimg.com/images/themes/theme1/bg.png');
            background-size: cover; background-position: center;
            display: flex; align-items: center; justify-content: center; border-bottom: 1px solid var(--border);
        }
        .banner h1 { font-size: 60px; font-weight: 900; letter-spacing: -3px; margin: 0; color: var(--blue); }

        .container { max-width: 1000px; margin: -50px auto 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 350px; gap: 20px; }
        
        .card { background: var(--card); border-radius: 16px; padding: 20px; border: 1px solid var(--border); }
        .stats { display: flex; gap: 10px; margin-bottom: 20px; }
        .stat-item { flex: 1; background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
        .stat-item h2 { margin: 0; font-size: 24px; color: var(--blue); }

        textarea { width: 100%; background: #000; border: 1px solid var(--border); padding: 15px; border-radius: 12px; color: #fff; height: 100px; resize: none; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border-radius: 30px; border: none; background: var(--blue); color: #fff; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        button:hover { opacity: 0.9; transform: scale(0.98); }

        .feed-item { padding: 15px; border-bottom: 1px solid var(--border); font-size: 14px; cursor: pointer; transition: 0.2s; }
        .feed-item:hover { background: #1c1f23; }
        .risk-badge { float: right; font-weight: bold; }
    </style>
</head>
<body>

    <div class="banner">
        <h1>DEFANS PRO</h1>
    </div>

    <div class="container">
        <div class="stats">
            <div class="stat-item"><h2 id="s-total">0</h2><small>TOPLAM</small></div>
            <div class="stat-item"><h2 id="s-risk" style="color:#f4212e">0</h2><small>RİSKLİ</small></div>
            <div class="stat-item"><h2 id="s-safe" style="color:#00ba7c">0</h2><small>TEMİZ</small></div>
        </div>

        <div class="grid">
            <div class="card">
                <h3 style="margin-top:0"><i class="fa-solid fa-bolt"></i> Hızlı Analiz</h3>
                <textarea id="uText" placeholder="İçeriği buraya yapıştır..."></textarea>
                <button onclick="analyze()">ANALİZ ET & BİLDİR</button>
                <div id="res" style="display:none; margin-top:20px; text-align:center; padding:20px; border-radius:12px;">
                    <div id="resStatus" style="font-size:32px; font-weight:900;"></div>
                    <div id="resRisk"></div>
                </div>
            </div>

            <div class="card">
                <h3 style="margin-top:0"><i class="fa-brands fa-x-twitter"></i> Canlı Sosyal Akış</h3>
                <div id="feedArea" style="max-height: 500px; overflow-y: auto;">Yükleniyor...</div>
            </div>
        </div>
    </div>

    <script>
        async function analyze() {
            const val = document.getElementById("uText").value;
            if(val.length < 5) return;
            const res = await fetch("/analyze", {
                method: "POST", headers: {"Content-Type": "application/json"},
                body: JSON.stringify({text: val})
            });
            const data = await res.json();
            
            document.getElementById("res").style.display = "block";
            document.getElementById("resStatus").innerText = data.status;
            document.getElementById("resRisk").innerText = "Risk Oranı: %" + data.risk;
            document.getElementById("res").style.backgroundColor = data.risk > 50 ? "rgba(244,33,46,0.1)" : "rgba(0,186,124,0.1)";
            document.getElementById("resStatus").style.color = data.risk > 50 ? "#f4212e" : "#00ba7c";

            document.getElementById("s-total").innerText = data.current_stats.total;
            document.getElementById("s-risk").innerText = data.current_stats.risk;
            document.getElementById("s-safe").innerText = data.current_stats.safe;
        }

        async function loadFeed() {
            const res = await fetch("/feed");
            const data = await res.json();
            let h = "";
            data.forEach(i => {
                h += `<div class="feed-item" onclick="document.getElementById('uText').value='${i.text}';">
                    <span class="risk-badge" style="color:${i.risk > 50 ? '#f4212e':'#00ba7c'}">%${i.risk}</span>
                    ${i.text.substring(0, 80)}...
                </div>`;
            });
            document.getElementById("feedArea").innerHTML = h;
        }
        loadFeed();
    </script>
</body>
</html>
