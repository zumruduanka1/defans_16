<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DEFANS PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<style>

:root{
    --bg:#080a0f;
    --card:#161b22;
    --border:#21262d;
    --text:#ffffff;
    --gray:#8b949e;
    --purple:#7d5fff;
    --blue:#3d5afe;
    --danger:#ff4757;
    --success:#2ed573;
    --warning:#f39c12;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background: radial-gradient(circle at top,#161b22,#080a0f);
    color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    padding:20px;
}

/* HEADER */

header{
    max-width:1200px;
    margin:auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:60px;
}

.logo{
    font-size:24px;
    font-weight:700;
}

.badge{
    padding:8px 16px;
    border-radius:20px;
    background:rgba(61,90,254,.15);
    border:1px solid #1f2937;
    color:#58a6ff;
}

/* HERO */

.hero{
    text-align:center;
    margin-bottom:50px;
}

.hero h1{
    font-size:64px;
    font-weight:800;
}

.hero p{
    margin-top:20px;
    color:var(--gray);
}

/* STATS */

.stats{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-bottom:50px;
    flex-wrap:wrap;
}

.stat{
    background:var(--card);
    border:1px solid var(--border);
    padding:20px;
    border-radius:16px;
    min-width:170px;
    text-align:center;
}

.stat h2{
    font-size:32px;
}

/* GRID */

.grid{
    max-width:1200px;
    margin:auto;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:25px;
}

.card{
    background:rgba(22,27,34,.7);
    border:1px solid var(--border);
    border-radius:22px;
    padding:25px;
    backdrop-filter:blur(10px);
}

/* FORM */

label{
    font-size:13px;
    color:var(--gray);
    display:block;
    margin-bottom:8px;
}

input,
textarea{
    width:100%;
    background:#ebf1f9;
    border:none;
    border-radius:12px;
    padding:14px;
    margin-bottom:18px;
    font-size:14px;
}

textarea{
    height:120px;
    resize:none;
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:14px;
    background:linear-gradient(90deg,var(--blue),var(--purple));
    color:white;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
}

/* RESULT */

.result-box{
    margin-top:20px;
    padding:15px;
    border-radius:14px;
    background:#0d1117;
}

.progress{
    margin-top:15px;
    height:8px;
    background:#222;
    border-radius:10px;
    overflow:hidden;
}

.bar{
    height:100%;
    width:0%;
    transition:.4s;
}

/* FEED */

.feed-item{
    padding:15px 0;
    border-bottom:1px solid var(--border);
    cursor:pointer;
    color:#d1d5db;
}

.feed-item:hover{
    opacity:.8;
}

.feed-icon{
    margin-right:10px;
}

/* STATUS */

.status{
    margin-top:10px;
    font-weight:700;
}

/* MOBILE */

@media(max-width:768px){

.grid{
    grid-template-columns:1fr;
}

.hero h1{
    font-size:38px;
}

}

</style>
</head>

<body>

<header>

<div class="logo">
<i class="fa-solid fa-shield-halved"></i>
DEFANS PRO
</div>

<div class="badge">
AI Powered
</div>

</header>

<section class="hero">

<h1>DEFANS</h1>

<p>
Dezenformasyon Erken Fark ve Analiz Sistemi
</p>

</section>

<div class="stats">

<div class="stat">
<h2 id="totalCount">0</h2>
<span>Toplam Analiz</span>
</div>

<div class="stat">
<h2 id="riskCount" style="color:var(--danger)">0</h2>
<span>Riskli İçerik</span>
</div>

<div class="stat">
<h2 id="safeCount" style="color:var(--success)">0</h2>
<span>Güvenli İçerik</span>
</div>

</div>

<div class="grid">

<!-- SOL -->

<div class="card">

<label>E-posta</label>
<input id="mail" type="email" placeholder="mail@example.com">

<label>Analiz Edilecek İçerik</label>

<textarea id="text"
placeholder="Haber, tweet, sosyal medya paylaşımı..."></textarea>

<button onclick="analyzeContent()">
<i class="fa-solid fa-magnifying-glass"></i>
Analiz Et
</button>

<div class="result-box">

<div id="resultText">
Sonuç bekleniyor...
</div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div class="status" id="status"></div>

</div>

</div>

<!-- SAĞ -->

<div class="card">

<h3 style="margin-bottom:20px;">
Sosyal Medya Akışı
</h3>

<div id="feed"></div>

</div>

</div>

<script>

let total = 0;
let risky = 0;
let safe = 0;

function updateStats(){

document.getElementById("totalCount").innerText = total;
document.getElementById("riskCount").innerText = risky;
document.getElementById("safeCount").innerText = safe;

}

async function analyzeContent(){

    const text = document.getElementById("text").value;

    if(text.length < 10){
        alert("İçerik çok kısa");
        return;
    }

    const res = await fetch("/analyze",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            text:text
        })
    });

    const data = await res.json();

    const risk = data.risk;

    document.getElementById("bar").style.width =
        risk + "%";

    let color = "#2ed573";

    if(risk > 70){
        color = "#ff4757";
    }
    else if(risk > 40){
        color = "#f39c12";
    }

    document.getElementById("bar").style.background = color;

    document.getElementById("resultText").innerText =
        "Risk Skoru: " + risk + "%";

    document.getElementById("status").innerText =
        data.status;

    document.getElementById("status").style.color =
        color;

    total++;

    if(risk > 40){
        risky++;
    }else{
        safe++;
    }

    updateStats();
}

async function loadFeed(){

    const res = await fetch("/feed");

    const data = await res.json();

    let html = "";

    data.forEach(item=>{

        let icon = "🌐";

        if(item.platform=="twitter"){
            icon = "🐦";
        }

        if(item.platform=="instagram"){
            icon = "📸";
        }

        if(item.platform=="facebook"){
            icon = "📘";
        }

        if(item.platform=="youtube"){
            icon = "▶️";
        }

        if(item.platform=="tiktok"){
            icon = "🎵";
        }

        html += `

        <div class="feed-item"
        onclick="useFeed('${item.text}')">

        <span class="feed-icon">${icon}</span>

        ${item.text}

        </div>

        `;

    });

    document.getElementById("feed").innerHTML = html;
}

function useFeed(text){

    document.getElementById("text").value = text;

}

loadFeed();

</script>

</body>
</html>
