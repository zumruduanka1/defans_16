<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DEFANS PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#080a0f;
    --card:#161b22;
    --border:#21262d;
    --text:#ffffff;
    --gray:#8b949e;
}

body{
    background: radial-gradient(circle at top,#161b22,#080a0f);
    color:var(--text);
    font-family:'Inter';
    padding:20px;
}

/* HEADER */
header{
    display:flex;
    justify-content:space-between;
    margin-bottom:50px;
}

.logo{
    font-size:22px;
    font-weight:700;
}

/* HERO */
.hero{
    text-align:center;
    margin-bottom:40px;
}

.hero h1{
    font-size:50px;
}

/* STATS */
.stats{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-bottom:40px;
}

.stat{
    background:var(--card);
    border:1px solid var(--border);
    padding:20px;
    border-radius:12px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:16px;
    padding:20px;
}

/* FORM */
input,textarea{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:none;
    background:#0d1117;
    color:#fff;
    margin-bottom:15px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#4461f2,#7d5fff);
    color:white;
    cursor:pointer;
}

/* TABLE */
table{
    width:100%;
}

td{
    padding:10px 0;
    border-top:1px solid var(--border);
}

.progress{
    height:6px;
    background:#222;
    border-radius:10px;
}

.bar{
    height:6px;
    border-radius:10px;
}
</style>
</head>

<body>

<header>
<div class="logo">DEFANS PRO</div>
<div>AI Powered</div>
</header>

<div class="hero">
<h1>DEFANS</h1>
<h2>Dezenformasyon Analiz Sistemi</h2>
</div>

<div class="stats">
<div class="stat">0 Analiz</div>
<div class="stat">0 Riskli</div>
<div class="stat">0 Güvenli</div>
</div>

<div class="grid">

<!-- SOL -->
<div class="card">

<input id="email" placeholder="Mail">
<textarea id="text" placeholder="Metin gir"></textarea>

<button onclick="analyze()">Analiz Et</button>

</div>

<!-- SAĞ -->
<div class="card">

<table>
<tbody id="table"></tbody>
</table>

</div>

</div>

<script>
const table = document.getElementById("table");

/* ANALİZ */
async function analyze(){

let text = document.getElementById("text").value;

let r = await fetch("/api/analyze",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({text})
});

let d = await r.json();

addRow(text,d.risk);
}

/* TABLOYA EKLE */
function addRow(text,risk){

let color="green";
if(risk>70) color="red";
else if(risk>40) color="orange";

/* sosyal icon */
let icon="🌐";
if(text.includes("twitter")) icon="🐦";
if(text.includes("instagram")) icon="📸";
if(text.includes("tiktok")) icon="🎵";

let row=`
<tr>
<td>${icon} ${text.substring(0,30)}</td>

<td>
<div class="progress">
<div class="bar" style="width:${risk}%;background:${color}"></div>
</div>
<span style="font-size:12px;color:#8b949e">${risk}%</span>
</td>

<td>${risk>70?"⚠️ Şüpheli":"✅ Güvenli"}</td>
</tr>
`;

table.innerHTML = row + table.innerHTML;
}

/* SOSYAL VERİ */
async function loadSocial(){

let r = await fetch("/api/social");
let data = await r.json();

data.forEach(p=>{
addRow(p.text,p.risk);
});

}

loadSocial();
</script>

</body>
</html>
