<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEFANS PRO | İstihbarat Paneli</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0e14;
            --card: #161b22;
            --border: #30363d;
            --primary: #5865f2;
            --text-main: #ffffff;
            --text-muted: #8b949e;
            --danger: #f4212e;
            --success: #00ba7c;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        /* Stats Section */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 30px;
            border-radius: 16px;
            text-align: center;
        }
        .stat-card h2 { font-size: 48px; margin: 0; font-weight: 800; }
        .stat-card p { color: var(--text-muted); font-size: 12px; margin-top: 10px; letter-spacing: 1px; }

        /* Main Panels */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }

        .panel {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
        }

        .panel h3 { margin-top: 0; font-size: 18px; border-bottom: 1px solid var(--border); padding-bottom: 15px; margin-bottom: 20px; }

        textarea {
            width: 100%;
            height: 150px;
            background: #0d1117;
            border: 1px solid var(--border);
            border-radius: 12px;
            color: #fff;
            padding: 15px;
            font-family: inherit;
            resize: none;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            background: linear-gradient(90deg, var(--primary), #8e5cf3);
            border: none;
            padding: 18px;
            color: white;
            font-weight: 800;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }
        button:hover { opacity: 0.9; transform: translateY(-2px); }

        /* Feed List */
        .feed-header {
            display: grid;
            grid-template-columns: 2fr 100px 100px;
            font-size: 11px;
            color: var(--text-muted);
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }

        .item {
            display: grid;
            grid-template-columns: 2fr 100px 100px;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid var(--border);
            gap: 15px;
        }

        .item-text { font-size: 13px; color: #e6edf3; line-height: 1.4; overflow: hidden; text-overflow: ellipsis; }

        /* Progress Bar */
        .bar-bg { background: #30363d; height: 6px; border-radius: 3px; overflow: hidden; }
        .bar-fill { height: 100%; background: linear-gradient(90deg, #f08b1d, var(--danger)); transition: 1s ease; }

        /* Badges */
        .badge {
            padding: 6px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 800;
            text-align: center;
            border: 1px solid;
        }
        .badge-danger { color: var(--danger); border-color: var(--danger); background: rgba(244, 33, 46, 0.1); }
        .badge-success { color: var(--success); border-color: var(--success); background: rgba(0, 186, 124, 0.1); }
    </style>
</head>
<body>

<div class="container">
    <div class="stats-grid">
        <div class="stat-card">
            <h2 id="total-val">4</h2>
            <p>TOPLAM ANALİZ</p>
        </div>
        <div class="stat-card">
            <h2 id="risk-val" style="color: var(--danger);">0</h2>
            <p>RİSKLİ İÇERİK</p>
        </div>
        <div class="stat-card">
            <h2 id="safe-val" style="color: var(--success);">1</h2>
            <p>GÜVENLİ İÇERİK</p>
        </div>
    </div>

    <div class="main-grid">
        <div class="panel">
            <h3>🔍 YENİ ANALİZ SORGULA</h3>
            <textarea id="userInput" placeholder="Analiz edilecek metni veya haberi buraya yapıştırın..."></textarea>
            <button onclick="startAnalyze()">YAPAY ZEKA ANALİZİ BAŞLAT</button>
        </div>

        <div class="panel">
            <h3>📊 CANLI ANALİZ AKIŞI</h3>
            <div class="feed-header">
                <div>İÇERİK</div>
                <div>RİSK</div>
                <div>DURUM</div>
            </div>
            <div id="feedArea">
                </div>
        </div>
    </div>
</div>

<script>
    async function startAnalyze() {
        const text = document.getElementById("userInput").value;
        if(!text) return;
        
        const btn = document.querySelector("button");
        btn.innerText = "İNCELENİYOR...";
        
        const res = await fetch("/analyze", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({text: text})
        });
        const data = await res.json();
        
        // Sayaçları Güncelle
        document.getElementById("total-val").innerText = data.stats.total;
        document.getElementById("risk-val").innerText = data.stats.risk;
        document.getElementById("safe-val").innerText = data.stats.safe;

        // Listeye Ekle
        addToList(data.text, data.risk, true);
        
        btn.innerText = "YAPAY ZEKA ANALİZİ BAŞLAT";
        document.getElementById("userInput").value = "";
    }

    function addToList(txt, risk, isNew = false) {
        const isRisk = risk > 45;
        const html = `
            <div class="item" style="${isNew ? 'border-left: 3px solid var(--primary); padding-left:10px;' : ''}">
                <div class="item-text">${txt.substring(0, 80)}...</div>
                <div class="bar-bg"><div class="bar-fill" style="width: ${risk}%"></div></div>
                <div class="badge ${isRisk ? 'badge-danger' : 'badge-success'}">${isRisk ? '▲ Şüpheli' : '✓ Güvenli'}</div>
            </div>
        `;
        const area = document.getElementById("feedArea");
        if(isNew) area.insertAdjacentHTML('afterbegin', html);
        else area.insertAdjacentHTML('beforeend', html);
    }

    async function loadFeed() {
        const res = await fetch("/feed");
        const data = await res.json();
        document.getElementById("feedArea").innerHTML = "";
        data.forEach(item => addToList(item.text, item.risk));
    }

async function fetchStats() {
    const res = await fetch("/get_stats");
    const data = await res.json();
    document.getElementById("s-total").innerText = data.total;
    document.getElementById("s-risk").innerText = data.risk;
    document.getElementById("s-safe").innerText = data.safe;
}


window.onload = fetchStats;

    loadFeed();
    setInterval(loadFeed, 60000); // 1 dakikada bir otomatik tazele
</script>

</body>
</html>
