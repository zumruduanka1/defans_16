<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DEFANS PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<style>
body {
    background:#080a0f;
    color:white;
    font-family:'Inter',sans-serif;
    padding:20px;
}

textarea {
    width:100%;
    padding:15px;
    border-radius:12px;
    border:none;
    margin-top:10px;
}

button {
    margin-top:15px;
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:linear-gradient(90deg,#4461f2,#7d5fff);
    color:white;
    cursor:pointer;
}

#resultBox {
    margin-top:20px;
    padding:15px;
    background:#161b22;
    border-radius:12px;
}

canvas {
    margin-top:30px;
    background:#161b22;
    border-radius:12px;
    padding:10px;
}

.log {
    border-bottom:1px solid #222;
    padding:10px;
    font-size:13px;
}
</style>
</head>

<body>

<h1>DEFANS PRO</h1>

<textarea placeholder="Sosyal medya linki veya haber metni"></textarea>
<button class="btn-main">Analiz Başlat</button>

<div id="resultBox">Sonuç burada görünecek</div>

<canvas id="riskChart"></canvas>

<h3>Son Analizler</h3>
<div id="logs"></div>

<script>
const socket = io();

// ----------------
// BUTTON FIX
// ----------------
document.querySelector(".btn-main").onclick = async () => {

    const text = document.querySelector("textarea").value;

    if(!text){
        alert("Metin gir");
        return;
    }

    try {
        const res = await fetch("/analyze",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({text})
        });

        const data = await res.json();

        document.getElementById("resultBox").innerHTML =
            `<b>Risk:</b> ${data.risk}% <br><br>${data.why || ""}`;

    } catch(e){
        console.error(e);
    }
};

// ----------------
// CHART
// ----------------
const ctx = document.getElementById("riskChart");

const chart = new Chart(ctx,{
    type:"line",
    data:{
        labels:[],
        datasets:[{
            label:"Risk",
            data:[],
            borderColor:"#7d5fff",
            backgroundColor:"rgba(125,95,255,0.2)"
        }]
    },
    options:{
        scales:{
            y:{min:0,max:100}
        }
    }
});

// ----------------
// SOCKET
// ----------------
socket.on("connect",()=>{
    console.log("socket bağlandı");
});

socket.on("live",(d)=>{

    const time = new Date().toLocaleTimeString();

    chart.data.labels.push(time);
    chart.data.datasets[0].data.push(d.risk);

    if(chart.data.labels.length>15){
        chart.data.labels.shift();
        chart.data.datasets[0].data.shift();
    }

    chart.update();

    addLog(d);
});

// ----------------
// LOG PANEL
// ----------------
function addLog(d){
    const el = document.createElement("div");
    el.className="log";

    el.innerHTML = `Risk: ${d.risk}% - ${d.text.slice(0,50)}`;

    document.getElementById("logs").prepend(el);
}

// ----------------
// ALERT
// ----------------
socket.on("alert",(d)=>{

    if(Notification.permission!=="granted"){
        Notification.requestPermission();
    }

    new Notification("⚠ Risk!",{
        body:d.text.slice(0,80)
    });
});
</script>

</body>
</html>
