<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEFANS PRO | Dezenformasyon Erken Fark ve Analiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <style>
        :root {
            --bg: #0b0e14;
            --card-bg: #161b22;
            --primary: #5865f2;
            --accent: #8e5cf3;
            --border: #30363d;
            --text-main: #ffffff;
            --text-muted: #8b949e;
            --danger: #d73a49;
            --warning: #e3b341;
            --success: #238636;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* HEADER */
        header {
            width: 100%;
            max-width: 1200px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }

        .logo { font-size: 22px; font-weight: 800; display: flex; align-items: center; gap: 10px; }
        .logo span { color: var(--primary); }
        .ai-badge { background: rgba(88, 101, 242, 0.1); border: 1px solid var(--primary); padding: 5px 12px; border-radius: 20px; font-size: 12px; color: var(--primary); }

        /* HERO SECTION */
        .hero { text-align: center; margin: 60px 20px; max-width: 900px; }
        .hero h1 { font-size: 56px; font-weight: 800; line-height: 1.1; margin-bottom: 20px; letter-spacing: -2px; }
        .hero p { color: var(--text-muted); font-size: 18px; line-height: 1.6; }

        /* STATS */
        .stats-container { display: flex; gap: 20px; margin-bottom: 50px; }
        .stat-box {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 30px;
            border-radius: 12px;
            min-width: 160px;
            text-align: center;
        }
        .stat-box h2 { font-size: 48px; margin: 0; color: var(--text-main); }
        .stat-box p { color: var(--text-muted); font-size: 13px; margin: 10px 0 0; text-transform: uppercase; letter-spacing: 1px; }

        /* MAIN CONTENT */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            width: 100%;
            max-width: 1200px;
            padding: 0 20px 60px;
            box-sizing: border-box;
        }

        .panel {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .panel-header { display: flex; align-items: center; gap: 10px; margin-bottom: 25px; font-size: 18px; font-weight: 600; }

        /* TABS */
        .tabs { display: flex; background: #0d1117; padding: 5px; border-radius: 12px; margin-bottom: 20px; }
        .tab { flex: 1; text-align: center; padding: 10px; font-size: 14px; border-radius: 8px; cursor: pointer; transition: 0.3s; color: var(--text-muted); }
        .tab.active { background: var(--border); color: #fff; }

        /* INPUTS */
        label { display: block; margin-bottom: 8px; font-size: 13px; color: var(--text-muted); }
        input, textarea {
            width: 100%;
            background: #1c2128;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            color: #fff;
            box-sizing: border-box;
            margin-bottom: 20px;
            font-family: inherit;
        }
        textarea { height: 150px; resize: none; }

        .btn-analyze {
            width: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border: none;
            padding: 18px;
            border-radius: 12px;
            color: #fff;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .btn-analyze:hover { opacity: 0.9; transform: scale(0.98); }

        /* LISTS */
        .analysis-list { display: flex; flex-direction: column; gap: 15px; }
        .analysis-item {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid var(--border);
        }
        .item-text { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-muted); }
        .puan-bar { height: 6px; background: var(--border); border-radius: 3px; position: relative; margin-right: 15px; }
        .puan-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, #f08b1d, #f4212e); }
        
        .status-badge {
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        .status-warning { background: rgba(227, 179, 65, 0.1); color: var(--warning); border: 1px solid var(--warning); }
        .status-success { background: rgba(35, 134, 54, 0.1); color: var(--success); border: 1px solid var(--success); }

<style>
    .analysis-item {
        display: flex;
        flex-direction: column; /* Haberler alt alta daha net görünsün */
        gap: 8px;
        padding: 20px;
        border-bottom: 1px solid var(--border);
        transition: 0.3s;
    }
    
    .analysis-item:hover { background: rgba(255,255,255,0.02); }

    .item-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
    }

    .item-text {
        font-size: 14px;
        line-height: 1.5;
        color: #e6edf3;
        white-space: normal; /* Metnin kesilmesini engeller, tam gösterir */
        display: block;
    }

    .item-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 10px;
    }

    .puan-container {
        display: flex;
        align-items: center;
        gap: 10px;
        flex: 1;
    }

    .puan-bar {
        height: 4px;
        background: #30363d;
        border-radius: 2px;
        flex: 1;
        max-width: 100px;
    }
</style>

<script>
async function loadFeed() {
    try {
        const res = await fetch("/feed");
        const data = await res.json();
        let html = "";
        data.forEach(item => {
            const isRisk = item.risk > 45;
            const statusClass = isRisk ? "status-warning" : "status-success";
            const statusText = isRisk ? "▲ Şüpheli" : "✓ Güvenli";
            
            html += `
                <div class="analysis-item">
                    <div class="item-text">${item.text}</div>
                    <div class="item-footer">
                        <div class="puan-container">
                            <span style="font-size: 10px; color: var(--text-muted)">RİSK: %${item.risk}</span>
                            <div class="puan-bar">
                                <div class="puan-fill" style="width: ${item.risk}%; background: ${isRisk ? 'var(--danger)' : 'var(--success)'}"></div>
                            </div>
                        </div>
                        <div class="status-badge ${statusClass}">${statusText}</div>
                    </div>
                </div>
            `;
        });
        document.getElementById("feedArea").innerHTML = html;
    } catch (e) {
        console.error("Yükleme hatası");
    }
}
</script>
