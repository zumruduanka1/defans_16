<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEFANS PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
    background:#0d1117;
    color:white;
    font-family:Inter;
    padding:20px;
}

.container{
    max-width:1100px;
    margin:auto;
}

.card{
    background:#161b22;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
}

button{
    background:#7d5fff;
    border:none;
    padding:12px;
    color:white;
    border-radius:10px;
    width:100%;
    cursor:pointer;
}

input,textarea{
    width:100%;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
    border:none;
}

.row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.stat{
    font-size:20px;
}
</style>
</head>

<body>

<div class="container">

<h1>DEFANS PRO</h1>

<div class="row">

<div class="card">
<textarea id="text" placeholder="Metin gir"></textarea>
<button onclick="analyze()">Analiz</button>

<input id="video" placeholder="Video URL">
<button onclick="video()">Deepfake Analiz</button>
</div>

<div class="card">
<h3>Canlı Analizler</h3>
<div id="list"></div>
</div>

</div>

<div class="card">
<h3>Dashboard</h3>
<div class="stat" id="stats"></div>
</div>

</div>

<script>

async function analyze(){
    let text = document.getElementById("text").value;

    let r = await fetch("/api/analyze",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({text})
    });

    let d = await r.json();
    alert("Risk: "+d.score);
}

async function loadSocial(){
    let r = await fetch("/api/social");
    let data = await r.json();

    let html="";
    data.forEach(p=>{
        html += <div>🐦 ${p.text} (${p.score})</div>;
    });

    document.getElementById("list").innerHTML = html;
}

async function video(){
    let url = document.getElementById("video").value;

    let r = await fetch("/api/deepfake",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({url})
    });

    let d = await r.json();
    alert("Deepfake: "+d.score+"%");
}

async function stats(){
    let r = await fetch("/api/stats");
    let d = await r.json();

    document.getElementById("stats").innerText =
        "Toplam: "+d.total+" | Riskli: "+d.danger+" | Güvenli: "+d.safe;
}

// 🔥 AUTO REFRESH
setInterval(()=>{
    loadSocial();
    stats();
},5000);

loadSocial();
stats();

</script>

</body>
</html>
