<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEFANS PRO | Sosyal Medya İstihbarat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <style>
        :root {
            --bg: #080a0f; --card: #12161f; --border: #21262d;
            --purple: #7d5fff; --blue: #3d5afe; --text: #8b949e;
            --danger: #ff4757; --success: #2ed573; --warning: #f39c12;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: white; padding: 20px; }

        header { max-width: 1200px; margin: 0 auto 40px; display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 10px; font-size: 24px; font-weight: 800; }
        .logo-box { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--blue), var(--purple)); }

        .stats { display: flex; justify-content: center; gap: 20px; margin-bottom: 40px; flex-wrap: wrap; }
        .stat { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 18px; min-width: 200px; text-align: center; }
        .stat h2 { font-size: 32px; margin-bottom: 5px; }
        .stat span { color: var(--text); font-size: 12px; font-weight: 600; text-transform: uppercase; }

        .grid { max-width: 1200px; margin: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 25px; }
        .card-title { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 20px; }

        textarea { width: 100%; height: 140px; background: #eef2ff; border: none; border-radius: 15px; padding: 15px; font-size: 14px; color: #111; outline: none; margin-bottom: 15px; }
        .btn { width: 100%; padding: 16px; border-radius: 15px; border: none; background: linear-gradient(90deg, #4461f2, #7d5fff); color: white; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }

        .result { margin-top: 20px; padding: 15px; border-radius: 15px; background: #0d1117; display: none; border: 1px solid var(--border); }
        .risk-bar { height: 10px; background: #1f2937; border-radius: 10px; margin-top: 10px; overflow: hidden; }
        .risk-fill { height: 100%; transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1); width: 0%; }

        .feed { max-height: 500px; overflow-y: auto; padding-right: 5px; }
        .feed::-webkit-scrollbar { width: 4px; }
        .feed::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .feed-item { padding: 15px 0; border-bottom: 1px solid var(--border); }
        .feed-top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        
        .platform { padding: 4px 10px; border-radius: 6px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .p-twitter { background: rgba(29, 161, 242, 0.15); color: #1da1f2; }
        .p-instagram { background: rgba(225, 48, 108, 0.15); color: #e1306c; }
        .p-facebook { background: rgba(24, 119, 242, 0.15); color: #1877f2; }
        .p-tiktok { background: rgba(0, 242, 234, 0.15); color: #00f2ea; }
        .p-sistem { background: rgba(125, 95, 255, 0.15); color: #7d5fff; }

        .feed-text { font-size: 13px; color: #e1e1e1; line-height: 1.5; margin-bottom: 10px; }
        .safe { background: var(--success); }
        .warn { background: var(--warning); }
        .danger { background: var(--danger); }

        @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <div class="logo-box"><i class="fa-solid fa-shield-halved"></i></div>
        DEFANS <span style="color:var(--blue)">PRO</span>
    </div>
</header>

<div class="stats">
    <div class="stat">
        <h2 id="totalStat">0</h2>
        <span>Toplam Veri</span>
    </div>
    <div class="stat">
        <h2 id="riskStat" style="color:var(--danger)">0</h2>
        <span>Riskli Tespit</span>
    </div>
    <div class="stat">
        <h2 id="safeStat" style="color:var(--success)">0</h2>
        <span>Güvenli</span>
    </div>
</div>

<div class="grid">
    <div class="card">
        <div class="card-title"><i class="fa-solid fa-bolt"></i> MANUEL ANALİZ</div>
        <textarea id="textInput" placeholder="Analiz edilecek içeriği buraya yapıştırın..."></textarea>
        <button class="btn" onclick="analyzeText()">İSTİHBARATI BAŞLAT</button>
        
        <div class="result" id="resultBox">
            <div id="resultStatus" style="font-weight: 800; font-size: 18px;"></div>
            <div id="riskText" style="margin-top: 5px; font-size: 13px; color: var(--text);"></div>
            <div class="risk-bar"><div class="risk-fill" id="riskFill"></div></div>
        </div>
    </div>

    <div class="card">
        <div class="card-title"><i class="fa-solid fa-rss"></i> SOSYAL MEDYA AKIŞI</div>
        <div class="feed" id="feed">Taramalar devam ediyor...</div>
    </div>
</div>

<script>
    async function updateStats() {
        try {
            let res = await fetch("/stats");
            let d = await res.json();
            document.getElementById("totalStat").innerText = d.total;
            document.getElementById("riskStat").innerText = d.risk;
            document.getElementById("safeStat").innerText = d.safe;
        } catch(e) {}
    }

    async function analyzeText() {
        let text = document.getElementById("textInput").value;
        if(!text) return;
        
        document.querySelector(".btn").innerText = "ANALİZ EDİLİYOR...";
        
        try {
            let res = await fetch("/analyze", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({text: text})
            });
            let d = await res.json();

            document.getElementById("resultBox").style.display = "block";
            document.getElementById("resultStatus").innerText = d.status;
            document.getElementById("riskText").innerText = "Risk Skoru: %" + d.risk;
            
            let fill = document.getElementById("riskFill");
            fill.style.width = d.risk + "%";
            
            // Renk kuralı: 75+ Kırmızı, 60+ Turuncu, Altı Yeşil
            fill.className = "risk-fill " + (d.risk >= 75 ? "danger" : (d.risk >= 60 ? "warn" : "safe"));
            
            updateStats();
        } catch(e) { console.error(e); }
        
        document.querySelector(".btn").innerText = "İSTİHBARATI BAŞLAT";
    }

    async function loadFeed() {
        try {
            let res = await fetch("/feed");
            let data = await res.json();
            let container = document.getElementById("feed");
            container.innerHTML = "";

            data.forEach(item => {
                let pClass = "p-sistem";
                let plat = item.platform.toLowerCase();
                if(plat === "twitter") pClass = "p-twitter";
                else if(plat === "instagram") pClass = "p-instagram";
                else if(plat === "facebook") pClass = "p-facebook";
                else if(plat === "tiktok") pClass = "p-tiktok";

                let riskClass = item.risk >= 75 ? "danger" : (item.risk >= 60 ? "warn" : "safe");

                container.innerHTML += `
                    <div class="feed-item">
                        <div class="feed-top">
                            <span class="platform ${pClass}">${item.platform}</span>
                            <span style="font-size:10px; color:${item.risk >= 60 ? 'var(--danger)' : 'var(--text)'}; font-weight:700;">%${item.risk} RİSK</span>
                        </div>
                        <div class="feed-text">${item.text}</div>
                    </div>`;
            });
            updateStats();
        } catch(e) {}
    }

    // İlk yükleme ve periyodik güncellemeler
    updateStats();
    loadFeed();
    setInterval(updateStats, 5000);
    setInterval(loadFeed, 30000); // 30 saniyede bir yeni haber akışı
</script>

</body>
</html>
