<!DOCTYPE html>
<html lang="tr">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>DEFANS PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<style>

:root{

--bg:#080a0f;
--card:#12161f;
--border:#21262d;
--purple:#7d5fff;
--blue:#3d5afe;
--text:#8b949e;
--danger:#ff4757;
--success:#2ed573;
--warning:#f39c12;

}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{

background:linear-gradient(to bottom,#0b0f16,#080a0f);

color:white;

min-height:100vh;

padding:20px;

}

header{

max-width:1200px;

margin:auto;

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:50px;

}

.logo{

display:flex;

align-items:center;

gap:10px;

font-size:24px;

font-weight:800;

}

.logo-box{

width:36px;
height:36px;

border-radius:10px;

display:flex;

align-items:center;

justify-content:center;

background:linear-gradient(
135deg,
var(--blue),
var(--purple)
);

}

.badge{

padding:8px 16px;

border-radius:999px;

background:rgba(61,90,254,.1);

color:#58a6ff;

font-size:12px;

border:1px solid #1f2937;

}

.hero{

text-align:center;

margin-bottom:45px;

}

.hero h1{

font-size:58px;

font-weight:800;

margin-bottom:10px;

}

.hero p{

max-width:700px;

margin:auto;

color:var(--text);

line-height:1.7;

font-size:15px;

}

.stats{

display:flex;

justify-content:center;

gap:20px;

flex-wrap:wrap;

margin-bottom:50px;

}

.stat{

background:var(--card);

border:1px solid var(--border);

padding:22px;

border-radius:20px;

min-width:180px;

text-align:center;

}

.stat h2{

font-size:34px;

margin-bottom:5px;

}

.stat span{

color:var(--text);

font-size:13px;

}

.grid{

max-width:1200px;

margin:auto;

display:grid;

grid-template-columns:1fr 1fr;

gap:25px;

}

.card{

background:rgba(18,22,31,.88);

border:1px solid var(--border);

border-radius:25px;

padding:28px;

}

.card-title{

display:flex;

align-items:center;

gap:10px;

font-size:14px;

font-weight:600;

color:var(--text);

margin-bottom:25px;

}

textarea{

width:100%;

height:150px;

background:#edf3ff;

border:none;

border-radius:14px;

padding:15px;

font-size:14px;

outline:none;

color:#111;

margin-bottom:20px;

resize:none;

}

.btn{

width:100%;

border:none;

padding:16px;

border-radius:15px;

font-size:15px;

font-weight:700;

cursor:pointer;

background:linear-gradient(
90deg,
#4461f2,
#7d5fff
);

color:white;

}

.result{

margin-top:20px;

padding:18px;

border-radius:15px;

background:#0d1117;

display:none;

}

.risk-bar{

height:8px;

background:#1f2937;

border-radius:999px;

overflow:hidden;

margin-top:12px;

}

.risk-fill{

height:100%;

width:0%;

}

.feed{

max-height:700px;

overflow:auto;

}

.feed-item{

border-top:1px solid var(--border);

padding:18px 0;

animation:fade .4s;

}

.feed-top{

display:flex;

align-items:center;

gap:10px;

margin-bottom:10px;

font-size:13px;

}

.platform{

width:34px;
height:34px;

border-radius:10px;

display:flex;

align-items:center;

justify-content:center;

}

.twitter{
background:#1da1f220;
}

.instagram{
background:#ff2d7520;
}

.facebook{
background:#1877f220;
}

.tiktok{
background:#25f4ee20;
}

.feed-text{

font-size:14px;

line-height:1.6;

margin-bottom:10px;

color:#d8d8d8;

}

.progress{

height:7px;

background:#222;

border-radius:999px;

overflow:hidden;

}

.progress div{
height:100%;
}

.safe{
background:var(--success);
}

.warn{
background:var(--warning);
}

.danger{
background:var(--danger);
}

@keyframes fade{

from{
opacity:0;
transform:translateY(10px);
}

to{
opacity:1;
transform:none;
}

}

@media(max-width:900px){

.grid{
grid-template-columns:1fr;
}

.hero h1{
font-size:36px;
}

}

</style>

</head>

<body>

<header>

<div class="logo">

<div class="logo-box">
<i class="fa-solid fa-shield-halved"></i>
</div>

DEFANS <span style="color:#58a6ff;">PRO</span>

</div>

<div class="badge">
LIVE AI
</div>

</header>

<section class="hero">

<h1>DEFANS</h1>

<h1 style="opacity:.9;">
Canlı Sosyal Medya Analiz Sistemi
</h1>

<p>
Gerçek zamanlı sosyal medya içeriklerini analiz eder.
Manipülasyon, deepfake ve sahte haber risklerini tespit eder.
</p>

</section>

<div class="stats">

<div class="stat">
<h2 id="totalStat">0</h2>
<span>Toplam Analiz</span>
</div>

<div class="stat">
<h2 id="riskStat"
style="color:var(--danger)">0</h2>
<span>Riskli İçerik</span>
</div>

<div class="stat">
<h2 id="safeStat"
style="color:var(--success)">0</h2>
<span>Güvenli İçerik</span>
</div>

</div>

<div class="grid">

<div class="card">

<div class="card-title">
<i class="fa-solid fa-magnifying-glass"></i>
YENİ ANALİZ
</div>

<textarea id="textInput"
placeholder="Sosyal medya içeriği gir..."></textarea>

<button class="btn"
onclick="analyzeText()">

Yapay Zeka Analizi Başlat

</button>

<div class="result"
id="resultBox">

<h3 id="resultStatus"></h3>

<div id="riskText"></div>

<div class="risk-bar">
<div class="risk-fill"
id="riskFill"></div>
</div>

</div>

</div>

<div class="card">

<div class="card-title">
<i class="fa-solid fa-chart-line"></i>
CANLI SOSYAL MEDYA AKIŞI
</div>

<div class="feed"
id="feed"></div>

</div>

</div>

<script>

async function analyzeText(){

let text=document.getElementById(
"textInput"
).value;

let r=await fetch("/analyze",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
text:text
})

});

let d=await r.json();

document.getElementById(
"resultBox"
).style.display="block";

document.getElementById(
"resultStatus"
).innerHTML=d.status;

document.getElementById(
"riskText"
).innerHTML=
"Risk Skoru: %"+d.risk;

let fill=document.getElementById(
"riskFill"
);

fill.style.width=d.risk+"%";

if(d.risk>70){

fill.className=
"risk-fill danger";

}else if(d.risk>40){

fill.className=
"risk-fill warn";

}else{

fill.className=
"risk-fill safe";

}

document.getElementById(
"totalStat"
).innerHTML=d.stats.total;

document.getElementById(
"riskStat"
).innerHTML=d.stats.risk;

document.getElementById(
"safeStat"
).innerHTML=d.stats.safe;

}

async function loadFeed(){

let r=await fetch("/feed");

let data=await r.json();

let feed=document.getElementById(
"feed"
);

feed.innerHTML="";

data.forEach(item=>{

let icon="fa-globe";
let cls="twitter";

if(item.platform==="twitter"){
icon="fa-brands fa-x-twitter";
cls="twitter";
}

if(item.platform==="instagram"){
icon="fa-brands fa-instagram";
cls="instagram";
}

if(item.platform==="facebook"){
icon="fa-brands fa-facebook-f";
cls="facebook";
}

if(item.platform==="tiktok"){
icon="fa-brands fa-tiktok";
cls="tiktok";
}

let riskClass="safe";

if(item.risk>70){
riskClass="danger";
}else if(item.risk>40){
riskClass="warn";
}

feed.innerHTML += `

<div class="feed-item">

<div class="feed-top">

<div class="platform ${cls}">
<i class="${icon}"></i>
</div>

<div>
${item.platform.toUpperCase()}
</div>

</div>

<div class="feed-text">
${item.text}
</div>

<div style="
display:flex;
justify-content:space-between;
font-size:13px;
margin-bottom:8px;
">

<div>Risk</div>

<div>%${item.risk}</div>

</div>

<div class="progress">
<div class="${riskClass}"
style="width:${item.risk}%"></div>
</div>

</div>

`;

});

}

loadFeed();

setInterval(loadFeed,15000);

</script>

</body>
</html>
