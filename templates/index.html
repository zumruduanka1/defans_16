<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEFANS PRO - Dezenformasyon Analiz Sistemi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

    <style>
        :root {
            --bg: #080a0f;
            --card: #161b22;
            --border: #21262d;
            --text: #ffffff;
            --gray: #8b949e;
            --purple: #7d5fff;
            --blue: #3d5afe;
            --danger: #ff4757;
            --success: #2ed573;
            --warning: #f39c12;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at top, #161b22, #080a0f);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        /* HEADER */
        header {
            max-width: 1200px;
            margin: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 60px;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo i {
            background: linear-gradient(135deg, var(--blue), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .badge {
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(61, 90, 254, .15);
            border: 1px solid #1f2937;
            color: #58a6ff;
            font-size: 12px;
        }

        /* HERO */
        .hero {
            text-align: center;
            margin-bottom: 50px;
        }

        .hero h1 {
            font-size: 64px;
            font-weight: 800;
            letter-spacing: -2px;
        }

        .hero p {
            margin-top: 10px;
            color: var(--gray);
            font-size: 18px;
        }

        /* STATS */
        .stats {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 50px;
            flex-wrap: wrap;
        }

        .stat {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 16px;
            min-width: 180px;
            text-align: center;
        }

        .stat h2 { font-size: 32px; margin-bottom: 5px; }
        .stat span { color: var(--gray); font-size: 12px; font-weight: 600; text-transform: uppercase; }

        /* GRID */
        .grid {
            max-width: 1200px;
            margin: auto;
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 25px;
        }

        .card {
            background: rgba(22, 27, 34, .7);
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 30px;
            backdrop-filter: blur(10px);
        }

        h3 { margin-bottom: 20px; font-size: 16px; color: var(--gray); display: flex; align-items: center; gap: 10px; }

        /* FORM */
        label { font-size: 13px; color: var(--gray); display: block; margin-bottom: 8px; font-weight: 600; }

        input, textarea {
            width: 100%;
            background: #ebf1f9;
            border: none;
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 18px;
            font-size: 14px;
            color: #080a0f;
            font-family: inherit;
        }

        textarea { height: 120px; resize: none; }

        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(90deg, var(--blue), var(--purple));
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s opacity;
        }

        button:hover { opacity: 0.9; }

        /* RESULT BOX */
        .result-box {
            margin-top: 25px;
            padding: 20px;
            border-radius: 14px;
            background: #0d1117;
            border: 1px solid var(--border);
        }

        .progress {
            margin: 15px 0;
            height: 10px;
            background: #222;
            border-radius: 10px;
            overflow: hidden;
        }

        .bar { height: 100%; width: 0%; transition: 0.8s cubic-bezier(0.17, 0.67, 0.83, 0.67); }

        .status { font-weight: 700; font-size: 18px; text-align: center; }

        /* FEED (SOSYAL MEDYA AKIŞI) */
        #feed {
            max-height: 500px;
            overflow-y: auto;
        }

        .feed-item {
            padding: 15px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .feed-item:hover { background: rgba(255,255,255,0.03); }
        .feed-icon { font-size: 18px; }
        .feed-text { font-size: 13px; line-height: 1.4; color: #d1d5db; }

        /* MOBILE */
        @media (max-width: 992px) {
            .grid { grid-template-columns: 1fr; }
            .hero h1 { font-size: 44px; }
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">
            <i class="fa-solid fa-shield-halved"></i>
            DEFANS PRO
        </div>
        <div class="badge">AI Powered System v2.0</div>
    </header>

    <section class="hero">
        <h1>DEFANS</h1>
        <p>Yapay Zeka Destekli Dezenformasyon ve Risk Analiz Platformu</p>
    </section>

    <div class="stats">
        <div class="stat">
            <h2 id="totalCount">0</h2>
            <span>Toplam Analiz</span>
        </div>
        <div class="stat">
            <h2 id="riskCount" style="color:var(--danger)">0</h2>
            <span>Riskli İçerik</span>
        </div>
        <div class="stat">
            <h2 id="safeCount" style="color:var(--success)">0</h2>
            <span>Güvenli İçerik</span>
        </div>
    </div>

    <div class="grid">
        <div class="card">
            <h3><i class="fa-solid fa-wand-magic-sparkles"></i> Manuel Analiz Aracı</h3>
            
            <label>E-posta (Raporlama İçin)</label>
            <input id="mail" type="email" placeholder="ornek@mail.com">

            <label>Analiz Edilecek İçerik (Metin, Link veya Haber Başlığı)</label>
            <textarea id="text" placeholder="Analiz etmek istediğiniz içeriği buraya yapıştırın..."></textarea>

            <button onclick="analyzeContent()">
                <i class="fa-solid fa-magnifying-glass"></i> Şimdi Analiz Et
            </button>

            <div class="result-box" id="resultArea" style="display: none;">
                <div id="resultText" style="text-align: center; color: var(--gray);">Risk Değerlendiriliyor...</div>
                <div class="progress">
                    <div class="bar" id="bar"></div>
                </div>
                <div class="status" id="status"></div>
            </div>
        </div>

        <div class="card">
            <h3><i class="fa-solid fa-rss"></i> Canlı Veri Akışı</h3>
            <div id="feed">
                <div style="padding: 20px; text-align: center; color: var(--gray);">Veriler yükleniyor...</div>
            </div>
        </div>
    </div>

    <script>
        let total = 0;
        let risky = 0;
        let safe = 0;

        function updateStats() {
            document.getElementById("totalCount").innerText = total;
            document.getElementById("riskCount").innerText = risky;
            document.getElementById("safeCount").innerText = safe;
        }

        async function analyzeContent() {
            const textInput = document.getElementById("text").value;

            if (textInput.trim().length < 10) {
                alert("Lütfen analiz için en az 10 karakter içeren bir metin girin.");
                return;
            }

            // Arayüz Hazırlığı
            document.getElementById("resultArea").style.display = "block";
            document.getElementById("status").innerText = "Analiz Ediliyor...";
            document.getElementById("bar").style.width = "10%";
            document.getElementById("bar").style.background = var(--blue);

            try {
                const res = await fetch("/analyze", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ text: textInput })
                });

                const data = await res.json();
                const risk = data.risk;

                // Bar ve Renk Güncelleme
                document.getElementById("bar").style.width = risk + "%";
                let color = "var(--success)";
                if (risk > 70) color = "var(--danger)";
                else if (risk > 40) color = "var(--warning)";

                document.getElementById("bar").style.background = color;
                document.getElementById("resultText").innerText = "Risk Skoru: %" + risk;
                document.getElementById("status").innerText = data.status;
                document.getElementById("status").style.color = color;

                // İstatistik Güncelleme
                total++;
                if (risk > 40) risky++; else safe++;
                updateStats();

            } catch (err) {
                console.error("Analiz hatası:", err);
                document.getElementById("status").innerText = "Bağlantı Hatası!";
            }
        }

        async function loadFeed() {
            try {
                const res = await fetch("/feed");
                const data = await res.json();
                let html = "";

                data.forEach(item => {
                    let icon = '<i class="fa-solid fa-globe"></i>';
                    if (item.platform === "twitter") icon = '<i class="fa-brands fa-x-twitter"></i>';
                    if (item.platform === "news") icon = '<i class="fa-solid fa-newspaper"></i>';
                    if (item.platform === "instagram") icon = '<i class="fa-brands fa-instagram"></i>';

                    html += `
                        <div class="feed-item" onclick="useFeed('${item.text.replace(/'/g, "\\'")}')">
                            <span class="feed-icon" style="color: ${item.risk > 50 ? 'var(--warning)' : 'var(--blue)'}">${icon}</span>
                            <div class="feed-text">
                                ${item.text}
                                <div style="font-size: 10px; margin-top: 5px; color: var(--gray);">Tahmini Risk: %${item.risk}</div>
                            </div>
                        </div>
                    `;
                });

                document.getElementById("feed").innerHTML = html || "Henüz veri yok.";
            } catch (err) {
                document.getElementById("feed").innerHTML = "Veri akışı şu an durduruldu.";
            }
        }

        function useFeed(text) {
            document.getElementById("text").value = text;
            window.scrollTo({ top: 400, behavior: 'smooth' });
        }

        // Sayfa yüklendiğinde çalıştır
        loadFeed();
        // Her 5 dakikada bir akışı yenile
        setInterval(loadFeed, 300000);
    </script>

</body>
</html>
