<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>DEFANS PRO | Global Tarayıcı</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <style>
        :root { --bg: #05070a; --card: #11161d; --border: #21262d; --blue: #0070f3; --danger: #ff4d4d; --success: #00ffbd; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        .hero h1 { font-size: 90px; font-weight: 900; text-align: center; margin: 20px 0; letter-spacing: -5px; background: linear-gradient(to bottom, #fff, #444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stats { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 15px; min-width: 150px; text-align: center; }
        .grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 20px; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 25px; border-radius: 20px; }
        textarea { width: 100%; background: #1a1f26; border: 1px solid var(--border); padding: 15px; border-radius: 12px; color: #fff; height: 120px; font-size: 16px; outline: none; }
        button { width: 100%; padding: 18px; border: none; border-radius: 12px; background: var(--blue); color: #fff; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        button:hover { opacity: 0.8; }
        .feed-item { padding: 12px; border-bottom: 1px solid #222; cursor: pointer; transition: 0.2s; }
        .feed-item:hover { background: #1a1f26; }
        .badge { font-size: 10px; padding: 3px 7px; border-radius: 4px; font-weight: 800; }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero"><h1>DEFANS</h1></div>
        
        <div class="stats">
            <div class="stat-card"> <h2 id="s-total">0</h2> <span>TARAMA</span> </div>
            <div class="stat-card"> <h2 id="s-risk" style="color:var(--danger)">0</h2> <span>RİSKLİ</span> </div>
            <div class="stat-card"> <h2 id="s-safe" style="color:var(--success)">0</h2> <span>TEMİZ</span> </div>
        </div>

        <div class="grid">
            <div class="card">
                <h3><i class="fa-solid fa-earth-americas"></i> GLOBAL ANALİZ MOTORU</h3>
                <textarea id="uText" placeholder="İnternetten veya sosyal medyadan içerik yapıştırın..."></textarea>
                <button onclick="analyze()">ANALİZ ET VE BİLDİR</button>
                <div id="res" style="display:none; margin-top:15px; text-align:center;">
                    <div id="resTitle" style="font-weight:bold;"></div>
                    <div id="resStatus" style="font-size:24px; font-weight:900;"></div>
                </div>
            </div>
            <div class="card">
                <h3><i class="fa-solid fa-tower-broadcast"></i> CANLI İNTERNET AKIŞI</h3>
                <div id="feedArea" style="max-height:400px; overflow-y:auto;">Yükleniyor...</div>
            </div>
        </div>
    </div>

    <script>
        async function analyze() {
            const val = document.getElementById("uText").value;
            if(val.length < 5) return;
            const res = await fetch("/analyze", {
                method: "POST", headers: {"Content-Type": "application/json"},
                body: JSON.stringify({text: val})
            });
            const data = await res.json();
            document.getElementById("res").style.display = "block";
            document.getElementById("resStatus").innerText = data.status;
            document.getElementById("resStatus").style.color = data.risk > 45 ? "var(--danger)" : "var(--success)";
            document.getElementById("s-total").innerText = data.current_stats.total;
            document.getElementById("s-risk").innerText = data.current_stats.risk;
            document.getElementById("s-safe").innerText = data.current_stats.safe;
        }

        async function loadFeed() {
            const res = await fetch("/feed");
            const data = await res.json();
            let h = "";
            data.forEach(i => {
                h += `<div class="feed-item" onclick="document.getElementById('uText').value='${i.text}';">
                    <div style="font-size:13px; margin-bottom:5px;">${i.text}</div>
                    <span class="badge" style="background:rgba(0,112,243,0.2); color:var(--blue)">${i.platform}</span>
                    <span class="badge" style="background:rgba(255,77,77,0.2); color:var(--danger)">Risk: %${i.risk}</span>
                </div>`;
            });
            document.getElementById("feedArea").innerHTML = h;
        }
        loadFeed();
        setInterval(loadFeed, 30000); // 30 saniyede bir güncelle
    </script>
</body>
</html>
