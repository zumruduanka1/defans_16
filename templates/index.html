<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEFANS PRO | Misinformation Detection</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <style>
        :root {
            --bg: #080a0f; --card: #12161f; --border: #21262d;
            --purple: #7d5fff; --blue: #3d5afe; --text: #8b949e;
            --danger: #ff4757; --success: #2ed573; --warning: #f39c12;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: white; padding: 20px; line-height: 1.6; }

        /* ÜST BAŞLIK ALANI */
        .top-nav { max-width: 1200px; margin: 0 auto 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .logo { display: flex; align-items: center; gap: 12px; font-size: 26px; font-weight: 800; letter-spacing: -1px; }
        .logo-box { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--blue), var(--purple)); box-shadow: 0 0 20px rgba(61, 90, 254, 0.4); }
        .active-badge { background: rgba(46, 213, 115, 0.1); color: var(--success); padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; display: flex; align-items: center; gap: 8px; border: 1px solid rgba(46, 213, 115, 0.2); }
        .pulse { width: 8px; height: 8px; background: var(--success); border-radius: 50%; box-shadow: 0 0 10px var(--success); animation: pulse-anim 1.5s infinite; }

        @keyframes pulse-anim { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* İSTATİSTİK PANELLERİ */
        .stats-grid { max-width: 1200px; margin: 0 auto 30px; display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); padding: 25px; border-radius: 20px; text-align: left; transition: 0.3s; }
        .stat-card:hover { border-color: var(--blue); transform: translateY(-5px); }
        .stat-card h3 { font-size: 12px; color: var(--text); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .stat-card div { font-size: 36px; font-weight: 800; }

        /* ANA İÇERİK */
        .main-container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1.2fr 1fr; gap: 30px; }
        .content-box { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 30px; }
        .box-header { display: flex; align-items: center; gap: 10px; margin-bottom: 25px; font-weight: 700; color: #fff; font-size: 18px; }
        
        textarea { width: 100%; height: 160px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 18px; padding: 20px; color: #fff; font-size: 15px; outline: none; transition: 0.3s; resize: none; margin-bottom: 20px; }
        textarea:focus { border-color: var(--blue); background: rgba(255,255,255,0.08); }
        
        .btn-analyze { width: 100%; padding: 18px; border-radius: 18px; border: none; background: linear-gradient(90deg, var(--blue), var(--purple)); color: white; font-weight: 800; font-size: 16px; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.3); transition: 0.3s; }
        .btn-analyze:hover { filter: brightness(1.1); transform: scale(1.01); }

        /* SONUÇ VE FEED */
        .res-display { margin-top: 25px; padding: 20px; border-radius: 20px; background: #080a0f; border: 1px solid var(--border); display: none; }
        .risk-meter { height: 12px; background: #1f2937; border-radius: 20px; margin-top: 15px; overflow: hidden; }
        .risk-bar-inner { height: 100%; width: 0%; transition: 1s cubic-bezier(0.17, 0.67, 0.83, 0.67); }

        .feed-list { max-height: 550px; overflow-y: auto; padding-right: 10px; }
        .feed-list::-webkit-scrollbar { width: 5px; }
        .feed-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .item { padding: 20px; border-bottom: 1px solid var(--border); animation: fadeIn 0.5s ease; }
        .item-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .tag { padding: 4px 12px; border-radius: 8px; font-size: 11px; font-weight: 800; text-transform: uppercase; }
        
        /* Renkler */
        .t-tw { background: rgba(29, 161, 242, 0.1); color: #1da1f2; }
        .t-ins { background: rgba(225, 48, 108, 0.1); color: #e1306c; }
        .t-fb { background: rgba(24, 119, 242, 0.1); color: #1877f2; }
        .t-tk { background: rgba(0, 242, 234, 0.1); color: #00f2ea; }
        
        .danger { background: var(--danger) !important; }
        .warning { background: var(--warning) !important; }
        .success { background: var(--success) !important; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 950px) { .main-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="top-nav">
    <div class="logo">
        <div class="logo-box"><i class="fa-solid fa-shield-check"></i></div>
        DEFANS <span style="color:var(--blue)">PRO</span>
    </div>
    <div class="active-badge">
        <div class="pulse"></div>
        CANLI ANALİZ SİSTEMİ AKTİF
    </div>
</div>

<div class="stats-grid">
    <div class="stat-card">
        <h3>Taranan Veri</h3>
        <div id="totalStat">0</div>
    </div>
    <div class="stat-card" style="border-left: 4px solid var(--danger);">
        <h3>Riskli Tespitler</h3>
        <div id="riskStat" style="color: var(--danger);">0</div>
    </div>
    <div class="stat-card" style="border-left: 4px solid var(--success);">
        <h3>Güvenli Kaynaklar</h3>
        <div id="safeStat" style="color: var(--success);">0</div>
    </div>
</div>

<div class="main-container">
    <div class="content-box">
        <div class="box-header"><i class="fa-solid fa-microchip" style="color:var(--blue)"></i> YAPAY ZEKA ANALİZ MOTORU</div>
        <textarea id="textInput" placeholder="Analiz edilecek sosyal medya içeriğini, haberi veya şüpheli bilgiyi buraya girin..."></textarea>
        <button class="btn-analyze" onclick="startAnalysis()">ANALİZİ BAŞLAT VE RAPORLA</button>
        
        <div class="res-display" id="resultBox">
            <div id="resStatus" style="font-weight: 800; font-size: 20px;"></div>
            <div id="resRisk" style="font-size: 14px; color: var(--text); margin-top: 5px;"></div>
            <div class="risk-meter">
                <div class="risk-bar-inner" id="riskFill"></div>
            </div>
        </div>
    </div>

    <div class="content-box">
        <div class="box-header"><i class="fa-solid fa-tower-broadcast" style="color:var(--purple)"></i> ANLIK PLATFORM AKIŞI</div>
        <div class="feed-list" id="feed">
            <div style="color:var(--text); text-align:center; padding:20px;">Veri havuzu taranıyor...</div>
        </div>
    </div>
</div>

<script>
    async function refreshStats() {
        try {
            const r = await fetch("/stats");
            const d = await r.json();
            document.getElementById("totalStat").innerText = d.total;
            document.getElementById("riskStat").innerText = d.risk;
            document.getElementById("safeStat").innerText = d.safe;
        } catch(e) {}
    }

    async function startAnalysis() {
        const text = document.getElementById("textInput").value;
        if(!text || text.length < 5) return;
        
        const btn = document.querySelector(".btn-analyze");
        btn.innerText = "VERİ İŞLENİYOR...";
        btn.disabled = true;

        try {
            const r = await fetch("/analyze", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({text: text})
            });
            const d = await r.json();

            document.getElementById("resultBox").style.display = "block";
            document.getElementById("resStatus").innerText = d.status;
            document.getElementById("resRisk").innerText = "Tespit Edilen Olasılık: %" + d.risk;
            
            const bar = document.getElementById("riskFill");
            bar.style.width = d.risk + "%";
            bar.className = "risk-bar-inner " + (d.risk >= 75 ? "danger" : (d.risk >= 60 ? "warning" : "success"));
            
            refreshStats();
        } catch(e) { alert("Sistem bağlantı hatası!"); }
        
        btn.innerText = "ANALİZİ BAŞLAT VE RAPORLA";
        btn.disabled = false;
    }

    async function loadFeed() {
        try {
            const r = await fetch("/feed");
            const data = await r.json();
            const container = document.getElementById("feed");
            container.innerHTML = "";

            data.forEach(item => {
                let tagClass = "t-tw";
                const p = item.platform.toLowerCase();
                if(p === "instagram") tagClass = "t-ins";
                else if(p === "facebook") tagClass = "t-fb";
                else if(p === "tiktok") tagClass = "t-tk";

                container.innerHTML += `
                    <div class="item">
                        <div class="item-meta">
                            <span class="tag ${tagClass}">${item.platform}</span>
                            <span style="font-weight:700; color:${item.risk >= 60 ? 'var(--danger)' : 'var(--text)'}; font-size:12px;">%${item.risk} RİSK</span>
                        </div>
                        <div style="font-size:13px; font-weight:500;">${item.text}</div>
                    </div>`;
            });
            refreshStats();
        } catch(e) {}
    }

    // Başlangıç
    refreshStats();
    loadFeed();
    setInterval(refreshStats, 5000);
    setInterval(loadFeed, 30000);
</script>

</body>
</html>
