<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>DEFANS PRO | İstihbarat Paneli</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0e14; --card: #161b22; --border: #30363d; --primary: #5865f2; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        
        /* Stats */
        .stats { display: flex; gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); padding: 25px; border-radius: 16px; flex: 1; text-align: center; }
        .stat-card h2 { font-size: 42px; margin: 0; }
        .stat-card p { font-size: 12px; color: #8b949e; margin-top: 5px; text-transform: uppercase; }

        /* Layout */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .panel { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 30px; }
        
        /* UI Elements */
        textarea { width: 100%; height: 160px; background: #0d1117; border: 1px solid var(--border); border-radius: 12px; color: #fff; padding: 15px; box-sizing: border-box; font-family: inherit; }
        button { width: 100%; padding: 18px; background: linear-gradient(90deg, #5865f2, #8e5cf3); border: none; color: #fff; font-weight: 800; border-radius: 12px; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        button:hover { opacity: 0.9; transform: scale(0.99); }

        /* List Items */
        .item { display: grid; grid-template-columns: 2fr 100px 100px; padding: 20px 0; border-bottom: 1px solid var(--border); align-items: center; gap: 20px; }
        .item-text { font-size: 13px; color: #e6edf3; line-height: 1.4; }
        
        /* Risk Bar */
        .bar-bg { background: #30363d; height: 6px; border-radius: 3px; overflow: hidden; }
        .bar-fill { background: linear-gradient(90deg, #f08b1d, #f4212e); height: 100%; transition: 0.8s; }
        
        .badge { padding: 6px; border-radius: 8px; font-size: 11px; font-weight: 700; text-align: center; border: 1px solid; }
        .danger { color: #f4212e; border-color: #f4212e; background: rgba(244,33,46,0.1); }
        .safe { color: #00ba7c; border-color: #00ba7c; background: rgba(0,186,124,0.1); }
    </style>
</head>
<body>
    <div class="container">
        <div class="stats">
            <div class="stat-card"><h2 id="s-total">4</h2><p>TOPLAM ANALİZ</p></div>
            <div class="stat-card"><h2 id="s-risk" style="color: #f4212e">0</h2><p>TEHLİKELİ</p></div>
            <div class="stat-card"><h2 id="s-safe" style="color: #00ba7c">1</h2><p>GÜVENLİ</p></div>
        </div>

        <div class="grid">
            <div class="panel">
                <h3 style="margin-top:0">🔍 YENİ ANALİZ</h3>
                <textarea id="uText" placeholder="İçeriği buraya yapıştırın..."></textarea>
                <button onclick="run()">YAPAY ZEKA ANALİZİ BAŞLAT</button>
            </div>

            <div class="panel">
                <h3 style="margin-top:0">📊 SON ANALİZLER</h3>
                <div id="feedArea">
                    <p style="color:#8b949e; text-align:center">Veriler yükleniyor...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function run() {
            const text = document.getElementById("uText").value;
            if(!text) return;
            const btn = document.querySelector("button");
            btn.innerText = "ANALİZ EDİLİYOR...";
            
            const res = await fetch("/analyze", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({text: text})
            });
            const data = await res.json();
            
            // Stats Güncelle
            document.getElementById("s-total").innerText = data.stats.total;
            document.getElementById("s-risk").innerText = data.stats.risk;
            document.getElementById("s-safe").innerText = data.stats.safe;

            addItem(data.text, data.risk, true);
            btn.innerText = "YAPAY ZEKA ANALİZİ BAŞLAT";
            document.getElementById("uText").value = "";
        }

        function addItem(txt, risk, top = false) {
            const isRisk = risk > 45;
            const html = `
                <div class="item">
                    <div class="item-text">${txt.substring(0, 100)}...</div>
                    <div class="bar-bg"><div class="bar-fill" style="width:${risk}%"></div></div>
                    <div class="badge ${isRisk ? 'danger' : 'safe'}">${isRisk ? '▲ Şüpheli' : '✓ Güvenli'}</div>
                </div>`;
            const area = document.getElementById("feedArea");
            if(top) area.insertAdjacentHTML('afterbegin', html);
            else area.insertAdjacentHTML('beforeend', html);
        }

        async function load() {
            const res = await fetch("/feed");
            const data = await res.json();
            document.getElementById("feedArea").innerHTML = "";
            data.forEach(i => addItem(i.text, i.risk));
        }
        load();
    </script>
</body>
</html>
