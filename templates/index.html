<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEFANS PRO | Yapay Zeka Analiz Sistemi</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

    <style>
        :root {
            --bg: #080a0f;
            --card: #161b22;
            --border: #21262d;
            --text: #ffffff;
            --gray: #8b949e;
            --purple: #7d5fff;
            --blue: #3d5afe;
            --danger: #ff4757;
            --success: #2ed573;
            --warning: #f39c12;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: radial-gradient(circle at top, #161b22, #080a0f);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        header {
            max-width: 1200px;
            margin: 0 auto 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { font-size: 24px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        .logo i { color: var(--blue); }
        
        .badge {
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(61, 90, 254, .1);
            border: 1px solid var(--border);
            color: #58a6ff;
            font-size: 12px;
        }

        .hero { text-align: center; margin-bottom: 40px; }
        .hero h1 { font-size: 56px; font-weight: 800; letter-spacing: -1px; }
        .hero p { color: var(--gray); margin-top: 10px; font-size: 16px; }

        .stats {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 16px;
            min-width: 170px;
            text-align: center;
        }

        .stat-card h2 { font-size: 32px; margin-bottom: 5px; }
        .stat-card span { color: var(--gray); font-size: 11px; font-weight: 600; text-transform: uppercase; }

        .grid {
            max-width: 1200px;
            margin: auto;
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 25px;
        }

        .card {
            background: rgba(22, 27, 34, .6);
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 25px;
            backdrop-filter: blur(10px);
        }

        h3 { font-size: 14px; color: var(--gray); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }

        label { font-size: 12px; color: var(--gray); display: block; margin-bottom: 8px; font-weight: 600; }

        input, textarea {
            width: 100%;
            background: #ebf1f9;
            border: none;
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 15px;
            font-size: 14px;
            color: #111;
            font-family: inherit;
        }

        textarea { height: 100px; resize: none; }

        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(90deg, var(--blue), var(--purple));
            color: white;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s ease;
        }

        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(61, 90, 254, 0.3); }

        .result-box {
            margin-top: 20px;
            padding: 20px;
            background: #0d1117;
            border-radius: 15px;
            border: 1px solid var(--border);
            display: none;
        }

        .progress { height: 8px; background: #222; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        .bar { height: 100%; width: 0%; transition: 1s ease-in-out; }

        .feed-item {
            padding: 15px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .feed-item:hover { background: rgba(255,255,255,0.03); }
        .feed-icon { font-size: 18px; color: var(--blue); }
        .feed-content { flex: 1; }
        .feed-text { font-size: 13px; color: #eee; margin-bottom: 5px; }
        .feed-meta { font-size: 10px; color: var(--gray); display: flex; justify-content: space-between; }

        @media (max-width: 992px) { .grid { grid-template-columns: 1fr; } .hero h1 { font-size: 38px; } }
    </style>
</head>
<body>

    <header>
        <div class="logo"><i class="fa-solid fa-shield-halved"></i> DEFANS PRO</div>
        <div class="badge">AI ANALYSIS ACTIVE</div>
    </header>

    <section class="hero">
        <h1>DEFANS</h1>
        <p>Gerçek Zamanlı Dezenformasyon ve Haber Analiz Sistemi</p>
    </section>

    <div class="stats">
        <div class="stat-card">
            <h2 id="st-total">0</h2>
            <span>Toplam Analiz</span>
        </div>
        <div class="stat-card">
            <h2 id="st-risk" style="color: var(--danger)">0</h2>
            <span>Yüksek Risk</span>
        </div>
        <div class="stat-card">
            <h2 id="st-safe" style="color: var(--success)">0</h2>
            <span>Güvenli</span>
        </div>
    </div>

    <div class="grid">
        <div class="card">
            <h3><i class="fa-solid fa-magnifying-glass"></i> İçerik Analizi</h3>
            <label>E-posta Adresi</label>
            <input type="email" id="u-mail" placeholder="rapor@email.com">
            
            <label>Analiz Edilecek Metin veya Link</label>
            <textarea id="u-text" placeholder="Haber başlığı, sosyal medya linki veya metin yapıştırın..."></textarea>
            
            <button onclick="runAnalysis()">ANALİZİ BAŞLAT</button>

            <div class="result-box" id="res-box">
                <div id="res-title" style="text-align: center; font-weight: 600;">Analiz Ediliyor...</div>
                <div class="progress"><div class="bar" id="res-bar"></div></div>
                <div id="res-status" style="text-align: center; font-size: 18px; font-weight: 800;"></div>
            </div>
        </div>

        <div class="card">
            <h3><i class="fa-solid fa-bolt"></i> Sosyal Medya Akışı</h3>
            <div id="feed-area">
                <div style="text-align:center; padding:20px; color:var(--gray);">Veriler yükleniyor...</div>
            </div>
        </div>
    </div>

    <script>
        let counter = { total: 0, risk: 0, safe: 0 };

        async function runAnalysis() {
            const text = document.getElementById("u-text").value;
            if(text.length < 5) return alert("Lütfen daha uzun bir içerik girin.");

            const box = document.getElementById("res-box");
            const bar = document.getElementById("res-bar");
            const status = document.getElementById("res-status");
            const title = document.getElementById("res-title");

            box.style.display = "block";
            status.innerText = "";
            title.innerText = "Yapay Zeka İnceliyor...";
            bar.style.width = "20%";
            bar.style.background = "var(--blue)";

            try {
                const response = await fetch("/analyze", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ text: text })
                });
                const data = await response.json();

                bar.style.width = data.risk + "%";
                title.innerText = "Risk Skoru: %" + data.risk;
                status.innerText = data.status;
                
                let color = "var(--success)";
                if(data.risk > 70) color = "var(--danger)";
                else if(data.risk > 40) color = "var(--warning)";
                
                bar.style.background = color;
                status.style.color = color;

                counter.total++;
                if(data.risk > 40) counter.risk++; else counter.safe++;
                
                document.getElementById("st-total").innerText = counter.total;
                document.getElementById("st-risk").innerText = counter.risk;
                document.getElementById("st-safe").innerText = counter.safe;

            } catch (e) {
                status.innerText = "Sunucu Hatası!";
                status.style.color = "red";
            }
        }

        async function fetchFeed() {
            try {
                const res = await fetch("/feed");
                const data = await res.json();
                let html = "";

                data.forEach(item => {
                    let icon = "fa-globe";
                    if(item.platform.includes("twitter")) icon = "fa-x-twitter";
                    if(item.platform.includes("news")) icon = "fa-newspaper";

                    html += `
                        <div class="feed-item" onclick="document.getElementById('u-text').value='${item.text.replace(/'/g, "")}'">
                            <div class="feed-icon"><i class="fa-solid ${icon}"></i></div>
                            <div class="feed-content">
                                <div class="feed-text">${item.text}</div>
                                <div class="feed-meta">
                                    <span>${item.platform.toUpperCase()}</span>
                                    <span style="color:${item.risk > 50 ? 'var(--warning)':'var(--success)'}">Risk: %${item.risk}</span>
                                </div>
                            </div>
                        </div>
                    `;
                });
                document.getElementById("feed-area").innerHTML = html;
            } catch (e) {
                document.getElementById("feed-area").innerHTML = "Akış şu an yüklenemiyor.";
            }
        }

        // İlk yükleme
        fetchFeed();
        // Her 2 dakikada bir otomatik yenile
        setInterval(fetchFeed, 120000);
    </script>
</body>
</html>
