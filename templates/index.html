<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEFANS PRO | AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <style>
        :root { --bg: #080a0f; --card: #161b22; --border: #21262d; --blue: #3d5afe; --purple: #7d5fff; --danger: #ff4757; --success: #2ed573; }
        body { background: radial-gradient(circle at top, #161b22, #080a0f); color: white; font-family: 'Inter', sans-serif; padding: 20px; margin: 0; }
        .container { max-width: 1200px; margin: auto; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; }
        .hero { text-align: center; margin: 40px 0; }
        .hero h1 { font-size: 80px; font-weight: 900; letter-spacing: -4px; margin: 0; }
        .stats { display: flex; justify-content: center; gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 20px; min-width: 180px; text-align: center; }
        .grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 30px; }
        .card { background: rgba(22, 27, 34, 0.7); border: 1px solid var(--border); padding: 30px; border-radius: 25px; backdrop-filter: blur(10px); }
        textarea { width: 100%; background: #ebf1f9; border: none; padding: 20px; border-radius: 15px; color: #111; height: 150px; font-family: inherit; }
        button { width: 100%; padding: 20px; border: none; border-radius: 15px; background: linear-gradient(90deg, var(--blue), var(--purple)); color: white; font-weight: 900; cursor: pointer; margin-top: 15px; }
        .result-box { margin-top: 25px; padding: 20px; background: #0d1117; border-radius: 20px; border: 1px solid var(--border); display: none; text-align: center; }
        .progress { height: 12px; background: #222; border-radius: 6px; margin: 15px 0; overflow: hidden; }
        .bar { height: 100%; width: 0%; transition: 1.5s; background: var(--blue); }
        .feed-item { padding: 15px; border-bottom: 1px solid var(--border); cursor: pointer; transition: 0.2s; }
        .feed-item:hover { background: rgba(255,255,255,0.05); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div style="font-weight: 800; font-size: 24px;"><i class="fa-solid fa-brain" style="color:var(--blue)"></i> DEFANS AI</div>
            <div style="color:var(--success); font-weight: bold; font-size: 12px;">SİSTEM AKTİF</div>
        </header>

        <section class="hero">
            <h1>DEFANS</h1>
            <p style="color:var(--gray)">Yapay Zeka Destekli Sosyal Medya Analiz Motoru</p>
        </section>

        <div class="stats">
            <div class="stat-card"> <h2 id="total-val">0</h2> <span>Analiz</span> </div>
            <div class="stat-card"> <h2 id="risk-val" style="color:var(--danger)">0</h2> <span>Risk</span> </div>
            <div class="stat-card"> <h2 id="safe-val" style="color:var(--success)">0</h2> <span>Güvenli</span> </div>
        </div>

        <div class="grid">
            <div class="card">
                <h3><i class="fa-solid fa-microchip"></i> ANALİZ PANELİ</h3>
                <textarea id="userInput" placeholder="İçerik yapıştırın..."></textarea>
                <button onclick="startAnalyze()">ANALİZ ET VE RAPORLA</button>
                <div class="result-box" id="resBox">
                    <div id="resTitle">Analiz Ediliyor...</div>
                    <div class="progress"><div class="bar" id="resBar"></div></div>
                    <div id="resStatus" style="font-size: 24px; font-weight: 900;"></div>
                </div>
            </div>
            <div class="card">
                <h3><i class="fa-solid fa-rss"></i> CANLI AKIŞ</h3>
                <div id="feed">Taranıyor...</div>
            </div>
        </div>
    </div>

    <script>
        async function startAnalyze() {
            const val = document.getElementById("userInput").value;
            if(val.length < 5) return alert("İçerik girin!");

            document.getElementById("resBox").style.display = "block";
            
            const res = await fetch("/analyze", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({text: val})
            });
            const data = await res.json();

            // Ekrandaki Yazıları Güncelle
            document.getElementById("resBar").style.width = data.risk + "%";
            document.getElementById("resStatus").innerText = data.status;
            document.getElementById("resTitle").innerText = "Risk Skoru: %" + data.risk;

            // Sunucudan gelen gerçek sayaç rakamlarını güncelle
            document.getElementById("total-val").innerText = data.current_stats.total;
            document.getElementById("risk-val").innerText = data.current_stats.risk;
            document.getElementById("safe-val").innerText = data.current_stats.safe;

            let c = data.risk > 70 ? "var(--danger)" : (data.risk > 45 ? "var(--warning)" : "var(--success)");
            document.getElementById("resBar").style.background = c;
            document.getElementById("resStatus").style.color = c;
        }

        async function loadFeed() {
            const res = await fetch("/feed");
            const data = await res.json();
            let html = "";
            data.forEach(i => {
                html += `<div class="feed-item" onclick="document.getElementById('userInput').value='${i.text}';">
                    <small style="color:var(--blue)">${i.platform}</small><br>${i.text}<br>
                    <small style="color:var(--danger)">Risk: %${i.risk}</small>
                </div>`;
            });
            document.getElementById("feed").innerHTML = html;
        }
        loadFeed();
    </script>
</body>
</html>
