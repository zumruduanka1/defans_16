<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>DEFANS PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0e14; --card: #161b22; --primary: #5865f2; --border: #30363d; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 40px; }
        .stats { display: flex; gap: 20px; justify-content: center; margin-bottom: 40px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 12px; min-width: 150px; text-align: center; }
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .panel { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 25px; }
        textarea { width: 100%; height: 150px; background: #0d1117; border: 1px solid var(--border); color: #fff; padding: 15px; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--primary); border: none; color: #fff; font-weight: bold; border-radius: 10px; cursor: pointer; margin-top: 10px; }
        .feed-item { padding: 15px; border-bottom: 1px solid var(--border); }
        .status-badge { font-size: 11px; padding: 4px 8px; border-radius: 5px; float: right; border: 1px solid; }
        .risk-up { color: #ff4444; border-color: #ff4444; }
        .safe-up { color: #00c851; border-color: #00c851; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><h1>DEFANS PRO</h1><p>Dezenformasyon Analiz Sistemi</p></div>
        <div class="stats">
            <div class="stat-card"><h2 id="s-total">0</h2><p>TOPLAM</p></div>
            <div class="stat-card"><h2 id="s-risk" style="color:#ff4444">0</h2><p>RİSKLİ</p></div>
            <div class="stat-card"><h2 id="s-safe" style="color:#00c851">0</h2><p>GÜVENLİ</p></div>
        </div>
        <div class="main-grid">
            <div class="panel">
                <h3>🔍 Yeni Analiz</h3>
                <textarea id="uText" placeholder="İçeriği yapıştırın..."></textarea>
                <button onclick="doAnalyze()">Analizi Başlat</button>
            </div>
            <div class="panel">
                <h3>📊 Son Analizler (TikTok, FB, X)</h3>
                <div id="feedArea">Yükleniyor...</div>
            </div>
        </div>
    </div>
    <script>
        async function doAnalyze() {
            const text = document.getElementById("uText").value;
            const res = await fetch("/analyze", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({text: text})
            });
            const data = await res.json();
            updateStats(data.current_stats);
            loadFeed();
        }

        function updateStats(s) {
            document.getElementById("s-total").innerText = s.total;
            document.getElementById("s-risk").innerText = s.risk;
            document.getElementById("s-safe").innerText = s.safe;
        }

        async function loadFeed() {
            const res = await fetch("/feed");
            const data = await res.json();
            let html = "";
            data.forEach(item => {
                const cls = item.risk > 45 ? "risk-up" : "safe-up";
                const txt = item.risk > 45 ? "Şüpheli" : "Güvenli";
                html += `<div class="feed-item"><span class="status-badge ${cls}">${txt}</span><p style="font-size:13px">${item.text}</p></div>`;
            });
            document.getElementById("feedArea").innerHTML = html;
        }
        loadFeed();
        setInterval(loadFeed, 60000);
    </script>
</body>
</html>
