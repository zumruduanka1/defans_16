<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>DEFANS PRO</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(#020617,#0f172a);
  color:white;
  text-align:center;
}

.box{
  margin-top:50px;
}

textarea{
  width:60%;
  height:120px;
  border-radius:12px;
  padding:10px;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:#6366f1;
  color:white;
  margin:10px;
}

.card{
  display:inline-block;
  padding:20px;
  margin:10px;
  border-radius:15px;
  background:rgba(255,255,255,0.05);
}

.bar{
  width:60%;
  margin:auto;
  background:#111;
  border-radius:10px;
}

.fill{
  height:20px;
  width:0%;
  border-radius:10px;
}

.risk{background:red;}
.safe{background:green;}
</style>
</head>

<body>

<h1>DEFANS</h1>

<div class="box">
<textarea id="text" placeholder="Metin veya URL gir"></textarea><br>
<button onclick="analyze()">Analiz</button>

<div>
  <div class="card">Risk: <span id="risk">0</span></div>
  <div class="card">Güvenli: <span id="safe">0</span></div>
</div>

<div class="bar"><div id="riskBar" class="fill risk"></div></div>
<div class="bar"><div id="safeBar" class="fill safe"></div></div>

</div>

<h2>Geçmiş</h2>
<div id="history"></div>

<script>
async function analyze(){
  const text = document.getElementById("text").value;

  const res = await fetch("/api/analyze",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({text})
  });

  const data = await res.json();

  if(data.error){
    alert(data.error);
    return;
  }

  document.getElementById("risk").innerText=data.risk;
  document.getElementById("safe").innerText=data.safe;

  document.getElementById("riskBar").style.width=data.risk+"%";
  document.getElementById("safeBar").style.width=data.safe+"%";

  loadHistory();

  if(data.risk>70){
    alert("⚠️ Riskli içerik!");
  }
}

async function loadHistory(){
  const res = await fetch("/api/history");
  const data = await res.json();

  let html="";
  data.forEach(x=>{
    html+=`<div>${x.text} → ${x.risk}</div>`;
  });

  document.getElementById("history").innerHTML=html;
}

loadHistory();
</script>

</body>
</html>
