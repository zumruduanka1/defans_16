<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DEFANS PRO</title>
<style>
body {
    background:#0b0f1a;
    color:white;
    font-family:sans-serif;
    text-align:center;
}

h1 {
    font-size:40px;
}

.box {
    width:60%;
    margin:auto;
}

textarea {
    width:100%;
    height:120px;
    border-radius:10px;
    padding:15px;
}

button {
    margin-top:10px;
    padding:12px 25px;
    border:none;
    border-radius:10px;
    background:linear-gradient(45deg,#4facfe,#00f2fe);
    color:white;
}

.card {
    display:inline-block;
    padding:20px;
    background:#111827;
    margin:10px;
    border-radius:10px;
}

.social {
    margin-top:30px;
}
</style>
</head>
<body>

<h1>DEFANS PRO</h1>

<div class="box">
<textarea id="text"></textarea>
<br>
<button onclick="analiz()">Analiz</button>
</div>

<div>
<div class="card">Risk: <span id="risk">0</span></div>
<div class="card">Güven: <span id="guven">0</span></div>
</div>

<div class="social">
<h2>Sosyal Medya</h2>
<div id="social"></div>
</div>

<script>
async function analiz(){
    let text = document.getElementById("text").value;

    let res = await fetch("/api/analyze",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({text})
    });

    let data = await res.json();

    document.getElementById("risk").innerText = data.risk;
    document.getElementById("guven").innerText = data.guven;
}

async function loadSocial(){
    let res = await fetch("/api/social");
    let data = await res.json();

    let html = "";
    data.forEach(item=>{
        html += `<div class="card">${item.text}<br>Risk: ${item.risk}</div>`;
    });

    document.getElementById("social").innerHTML = html;
}

loadSocial();
</script>

</body>
</html>
