<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>DEFANS PRO</title>
<style>
body {
    background:#0b0f1a;
    color:white;
    font-family:sans-serif;
    text-align:center;
}

h1 {
    font-size:40px;
    margin-top:40px;
}

.box {
    margin:20px auto;
    width:60%;
}

textarea, input {
    width:100%;
    padding:15px;
    border-radius:10px;
    border:none;
    margin-top:10px;
}

button {
    margin-top:20px;
    padding:15px 30px;
    border:none;
    border-radius:10px;
    background:linear-gradient(45deg,#4facfe,#00f2fe);
    color:white;
    font-size:16px;
    cursor:pointer;
}

.result {
    margin-top:30px;
    font-size:20px;
}

.card {
    display:inline-block;
    padding:20px;
    margin:10px;
    border-radius:15px;
    background:#111827;
}
</style>
</head>
<body>

<h1>DEFANS</h1>

<div class="box">
    <textarea id="text" placeholder="Metin gir..."></textarea>
    <input id="url" placeholder="veya URL gir...">
    <button onclick="analiz()">Analiz</button>
</div>

<div class="result">
    <div class="card">Risk: <span id="risk">0</span></div>
    <div class="card">Güven: <span id="guven">0</span></div>
    <div id="yorum"></div>
</div>

<script>
async function analiz() {
    let text = document.getElementById("text").value;
    let url = document.getElementById("url").value;

    let res = await fetch("/api/analyze", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({text, url})
    });

    let data = await res.json();

    document.getElementById("risk").innerText = data.risk || 0;
    document.getElementById("guven").innerText = data.guven || 0;
    document.getElementById("yorum").innerText = data.yorum || "";
}
</script>

</body>
</html>
